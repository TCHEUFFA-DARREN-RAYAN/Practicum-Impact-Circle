<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>My Schedule | Organization | ImpactCircle</title>
  <link rel="stylesheet" href="/css/base.css">
  <style>
    .cal-layout { display:grid; grid-template-columns:1fr 340px; gap:1.25rem; align-items:start; }
    @media(max-width:920px){ .cal-layout{ grid-template-columns:1fr; } }
    .cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
    .cal-label { font-size:1.1rem; font-weight:700; }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
    .cal-dow { text-align:center; font-size:0.72rem; font-weight:700; color:var(--text-muted); padding:0.5rem 0; text-transform:uppercase; }
    .cal-cell { min-height:64px; border:1px solid var(--border); border-radius:6px; padding:0.35rem 0.45rem; cursor:pointer; background:#fff; transition:background 0.12s; }
    .cal-cell:hover { background:#f0f9ff; }
    .cal-cell.empty { background:var(--bg-subtle,#f8fafc); cursor:default; border-color:transparent; }
    .cal-cell.today { border-color:var(--primary); }
    .cal-cell.selected { background:var(--primary); }
    .cal-cell.selected .cal-dn { color:#fff; }
    .cal-cell.selected .cal-dot { background:rgba(255,255,255,0.8); }
    .cal-cell.selected .cal-cnt { color:rgba(255,255,255,0.85); }
    .cal-dn { font-size:0.8rem; font-weight:600; }
    .cal-dots { display:flex; gap:2px; margin-top:3px; flex-wrap:wrap; }
    .cal-dot { width:6px; height:6px; border-radius:50%; background:var(--primary); }
    .cal-dot.full { background:#00a344; }
    .cal-cnt { font-size:0.67rem; color:var(--primary); font-weight:600; margin-top:2px; }
    .detail-panel { position:sticky; top:1rem; }
    .shift-card { border:1px solid var(--border); border-radius:10px; padding:1rem; margin-bottom:0.875rem; }
    .shift-card.full { border-color:#00a344; }
    .full-badge { display:inline-flex;align-items:center;gap:0.25rem;background:#effff6;color:#00a344;border-radius:20px;padding:0.15rem 0.5rem;font-size:0.7rem;font-weight:700;margin-left:0.375rem; }
    .vol-row { display:flex; align-items:center; gap:0.625rem; padding:0.375rem 0; }
    .vol-av { width:32px; height:32px; border-radius:50%; background:var(--primary); display:flex; align-items:center; justify-content:center; font-size:0.8rem; font-weight:700; color:#fff; overflow:hidden; flex-shrink:0; }
    .vol-av img { width:100%; height:100%; object-fit:cover; }
  </style>
</head>
<body>
<nav id="navbar"></nav>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<aside id="sidebar" class="sidebar"></aside>
<div class="page-content">
  <div class="container">
    <div class="page-header">
      <div class="page-header-row">
        <div><h1>My Schedule</h1><p class="text-muted">Your upcoming gigs and assigned volunteers</p></div>
        <a href="/org-dashboard" class="btn btn-secondary">← Dashboard</a>
      </div>
    </div>

    <div class="cal-layout">
      <div class="card" style="padding:1.25rem">
        <div class="cal-nav">
          <button class="btn btn-secondary btn-sm" onclick="changeMonth(-1)">&#8249; Prev</button>
          <span class="cal-label" id="monthLabel"></span>
          <button class="btn btn-secondary btn-sm" onclick="changeMonth(1)">Next &#8250;</button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>

      <div class="card detail-panel" style="padding:1.25rem">
        <div id="detailEmpty" style="text-align:center;padding:2rem 1rem;color:var(--text-muted)">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:block;margin:0 auto 0.75rem;opacity:0.4"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <p style="margin:0;font-size:0.875rem">Click a date to see your gigs</p>
        </div>
        <div id="detailContent" style="display:none">
          <div id="detailDate" style="font-size:1rem;font-weight:700;color:var(--text);margin-bottom:1rem"></div>
          <div id="detailShifts"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/footer.js"></script>
<script>
API.requireAuth('org');
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
let year = new Date().getFullYear(), month = new Date().getMonth()+1, calData = {}, sel = null;

async function load() {
  document.getElementById('monthLabel').textContent = `${MONTHS[month-1]} ${year}`;
  const dow = DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  document.getElementById('calGrid').innerHTML = dow + '<div style="grid-column:1/-1;text-align:center;padding:2rem"><div class="spinner"></div></div>';
  try {
    const { data } = await API.get(`/orgs/me/calendar?year=${year}&month=${month}`);
    calData = data.calendar || {};
    renderGrid();
  } catch(e) { Toast.error('Failed: '+e.message); }
}

function renderGrid() {
  const first = new Date(year, month-1, 1).getDay();
  const days = new Date(year, month, 0).getDate();
  const td = new Date(), isToday = d => td.getFullYear()===year&&td.getMonth()+1===month&&td.getDate()===d;
  const isPast = d => new Date(year, month-1, d) < new Date(td.getFullYear(), td.getMonth(), td.getDate());
  let html = DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for (let i=0; i<first; i++) html += '<div class="cal-cell empty"></div>';
  for (let d=1; d<=days; d++) {
    const k = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const gigs = calData[k] || [];
    const vols = gigs.reduce((s,g)=>s+(g.Tasks||[]).length, 0);
    const pastStyle = isPast(d) ? 'opacity:0.5;' : '';
    html += `<div class="cal-cell${isToday(d)?' today':''}${sel===k?' selected':''}" style="${pastStyle}" onclick="selectDate('${k}')">
      <div class="cal-dn">${d}</div>
      ${gigs.length?`<div class="cal-dots">${gigs.slice(0,4).map(g=>`<div class="cal-dot${g.isFull?' full':''}"></div>`).join('')}</div><div class="cal-cnt">${gigs.length}g·${vols}v</div>`:''}
    </div>`;
  }
  document.getElementById('calGrid').innerHTML = html;
}

function selectDate(k) {
  sel = k; renderGrid();
  const gigs = calData[k] || [];
  document.getElementById('detailEmpty').style.display = gigs.length?'none':'';
  document.getElementById('detailContent').style.display = gigs.length?'':'none';
  if (!gigs.length) return;
  document.getElementById('detailDate').textContent = new Date(k+'T12:00:00').toLocaleDateString('en-CA',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  document.getElementById('detailShifts').innerHTML = gigs.map(g => {
    const tasks = g.Tasks || [];
    const vHtml = tasks.length ? tasks.map(t => {
      const v = t.volunteer||{}, vp = v.volunteerProfile||{};
      const nm = [vp.firstName,vp.lastName].filter(Boolean).join(' ')||v.email||'—';
      const av = v.avatarUrl&&v.id?`<div class="vol-av"><img src="/api/uploads/${v.id}/${v.avatarUrl}" alt="${nm}"></div>`:`<div class="vol-av">${(nm[0]||'?').toUpperCase()}</div>`;
      return `<div class="vol-row">${av}<div><div style="font-size:0.82rem;font-weight:600">${nm}</div><div style="font-size:0.75rem;color:var(--text-muted)">${v.email||''}</div></div></div>`;
    }).join('') : '<div style="font-size:0.82rem;color:var(--text-muted)">No volunteers assigned yet.</div>';
    const time = g.startTime&&g.endTime?`${g.startTime}–${g.endTime}`:'';
    const fullBadge = g.isFull ? '<span class="full-badge">✓ Full</span>' : (g.maxVolunteers ? `<span style="font-size:0.7rem;color:var(--text-muted)">${g.acceptedCount}/${g.maxVolunteers}</span>` : '');
    return `<div class="shift-card${g.isFull?' full':''}">
      <div style="font-weight:700;font-size:0.9rem;margin-bottom:0.2rem">${g.title}${fullBadge}</div>
      ${time?`<div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.5rem">${time}</div>`:''}
      <div style="font-size:0.72rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:0.25rem">Volunteers (${tasks.length}${g.maxVolunteers?' / '+g.maxVolunteers:''})</div>
      ${vHtml}
      <div style="margin-top:0.625rem"><a href="/gigs/${g.id}" class="btn btn-sm btn-secondary">View Gig</a></div>
    </div>`;
  }).join('');
}

function changeMonth(d) {
  month+=d; if(month>12){month=1;year++;} if(month<1){month=12;year--;}
  sel=null; document.getElementById('detailEmpty').style.display=''; document.getElementById('detailContent').style.display='none';
  load();
}

load();
</script>
</body>
</html>
