<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Check-in — ImpactCircle</title>
  <link rel="stylesheet" href="/css/base.css">
  <style>
    .checkin-container { max-width: 600px; margin: 40px auto; padding: 24px; }
    .event-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 32px; text-align: center; }
    .event-card h1 { font-size: 1.5rem; margin-bottom: 8px; color: #1e293b; }
    .event-card .org-name { color: #6366f1; font-weight: 600; margin-bottom: 16px; }
    .event-details { text-align: left; margin: 20px 0; padding: 16px; background: #f8fafc; border-radius: 12px; }
    .event-details p { margin: 8px 0; color: #475569; font-size: 0.95rem; }
    .event-details strong { color: #1e293b; }
    .checkin-btn { display: inline-block; padding: 16px 48px; background: #16a34a; color: #fff; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .checkin-btn:hover { background: #15803d; transform: translateY(-1px); }
    .checkin-btn:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }
    .checkout-btn { background: #dc2626; }
    .checkout-btn:hover { background: #b91c1c; }
    .status-msg { margin-top: 16px; padding: 12px; border-radius: 8px; font-weight: 500; }
    .status-msg.success { background: #dcfce7; color: #166534; }
    .status-msg.error { background: #fef2f2; color: #991b1b; }
    .status-msg.info { background: #dbeafe; color: #1e40af; }
    .login-prompt { margin-top: 20px; padding: 16px; background: #fef3c7; border-radius: 8px; color: #92400e; }
    .login-prompt a { color: #d97706; font-weight: 600; }

    .leave-btn {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 20px; padding: 10px 20px;
      background: #fff; color: #475569; border: 1px solid #e2e8f0;
      border-radius: 10px; font-size: 0.9rem; font-weight: 500;
      cursor: pointer; text-decoration: none; transition: all 0.15s;
    }
    .leave-btn:hover { background: #f8fafc; color: #1e293b; border-color: #cbd5e1; }

    /* Check-out confirmation modal */
    .co-backdrop {
      position: fixed; inset: 0; background: rgba(15,23,42,0.55); z-index: 1000;
      display: none; align-items: center; justify-content: center; padding: 1rem;
    }
    .co-backdrop.show { display: flex; }
    .co-modal {
      background: #fff; border-radius: 16px; max-width: 440px; width: 100%;
      padding: 28px; text-align: center; box-shadow: 0 24px 64px rgba(15,23,42,0.25);
    }
    .co-icon {
      width: 56px; height: 56px; border-radius: 50%;
      background: #fef2f2; color: #dc2626;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    .co-title { font-size: 1.15rem; font-weight: 700; color: #1e293b; margin-bottom: 8px; }
    .co-body { font-size: 0.92rem; color: #475569; margin-bottom: 6px; line-height: 1.55; }
    .co-elapsed { font-size: 0.82rem; color: #64748b; margin-bottom: 20px; font-style: italic; }
    .co-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .co-btn {
      padding: 12px 24px; border-radius: 10px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      border: none; transition: all 0.15s;
    }
    .co-btn-cancel { background: #f1f5f9; color: #334155; }
    .co-btn-cancel:hover { background: #e2e8f0; }
    .co-btn-confirm { background: #dc2626; color: #fff; }
    .co-btn-confirm:hover { background: #b91c1c; }
    .co-btn-confirm:disabled { background: #94a3b8; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="checkin-container">
    <div class="event-card" id="eventCard">
      <div id="loading"><p>Loading event details...</p></div>
      <div id="eventContent" style="display:none;">
        <h1 id="eventTitle"></h1>
        <p class="org-name" id="orgName"></p>
        <div class="event-details">
          <p><strong>Date:</strong> <span id="eventDate"></span></p>
          <p><strong>Time:</strong> <span id="eventTime"></span></p>
          <p><strong>Location:</strong> <span id="eventLocation"></span></p>
          <p><strong>Category:</strong> <span id="eventCategory"></span></p>
          <p id="eventDesc"></p>
        </div>
        <div id="actionArea"></div>
        <div id="statusMsg"></div>
        <div>
          <a href="/volunteer-dashboard" class="leave-btn" id="leaveLink">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            Back to Dashboard
          </a>
        </div>
      </div>
      <div id="errorContent" style="display:none;">
        <h2 style="color:#dc2626;">Error</h2>
        <p id="errorMsg"></p>
        <a href="/volunteer-dashboard" class="leave-btn" style="margin-top:16px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          Back to Dashboard
        </a>
      </div>
    </div>
  </div>

  <!-- Check-out confirmation modal -->
  <div class="co-backdrop" id="coModal">
    <div class="co-modal">
      <div class="co-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <div class="co-title">Check out early?</div>
      <div class="co-body">Your hours will be calculated from check-in time until now. This can't be undone.</div>
      <div class="co-elapsed" id="coElapsed"></div>
      <div class="co-actions">
        <button class="co-btn co-btn-cancel" type="button" onclick="cancelCheckOut()">Cancel</button>
        <button class="co-btn co-btn-confirm" type="button" id="coConfirmBtn" onclick="confirmCheckOut()">Yes, check me out</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const token = window.location.pathname.split('/checkin/')[1];
    const user = JSON.parse(localStorage.getItem('ic_user') || 'null');
    const authToken = localStorage.getItem('ic_token');

    async function loadEvent() {
      try {
        const headers = authToken ? { Authorization: `Bearer ${authToken}` } : {};
        const resp = await fetch(`/api/attendance/checkin/${token}`, { headers });
        const data = await resp.json();

        if (!data.success) {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('errorContent').style.display = 'block';
          document.getElementById('errorMsg').textContent = data.message;
          return;
        }

        const gig = data.data.gig;
        document.getElementById('loading').style.display = 'none';
        document.getElementById('eventContent').style.display = 'block';
        document.getElementById('eventTitle').textContent = gig.title;
        document.getElementById('orgName').textContent = gig.organization?.orgName || '';
        document.getElementById('eventDate').textContent = `${gig.startDate} — ${gig.endDate}`;
        document.getElementById('eventTime').textContent = gig.startTime ? `${gig.startTime} - ${gig.endTime || 'End'}` : 'Flexible';
        document.getElementById('eventLocation').textContent = gig.locationType === 'remote' ? 'Remote' : (gig.locationAddress || 'In-person');
        document.getElementById('eventCategory').textContent = gig.category?.name || '';
        document.getElementById('eventDesc').textContent = gig.description?.substring(0, 200) || '';

        const actionArea = document.getElementById('actionArea');

        if (!user || !authToken) {
          /* Stash the check-in URL so login / register pages can redirect back
             after auth. ?redirect=... is the primary contract; the localStorage
             fallback covers register flows that don't preserve the query string. */
          const checkinPath = `/checkin/${token}`;
          try { localStorage.setItem('ic_post_login_redirect', checkinPath); } catch {}
          const enc = encodeURIComponent(checkinPath);
          actionArea.innerHTML = `
            <div class="login-prompt" style="margin-bottom:16px">
              <p style="margin-bottom:12px"><strong>Sign in to check in</strong></p>
              <p style="margin:0;font-size:0.88rem">You need an ImpactCircle volunteer account to record your hours.</p>
            </div>
            <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px">
              <a href="/login?redirect=${enc}" class="checkin-btn" style="text-decoration:none;font-size:0.95rem;padding:14px 28px">Log in</a>
              <a href="/register-volunteer?redirect=${enc}" class="checkin-btn" style="text-decoration:none;font-size:0.95rem;padding:14px 28px;background:#fff;color:#16a34a;border:2px solid #16a34a">Create account</a>
            </div>`;
          return;
        }

        if (user.role === 'org' || user.role === 'admin') {
          if (gig.id) {
            actionArea.innerHTML = `
              <div class="status-msg info" style="margin-bottom:12px;">You are viewing as an organiser.</div>
              <a href="/org/gigs/${gig.id}/qr-display" class="checkin-btn" style="display:inline-block;text-decoration:none;background:#6366f1">
                Open QR Poster / Print Page
              </a>`;
          } else {
            actionArea.innerHTML = '<div class="status-msg info">Organiser view — volunteers scan this page to check in.</div>';
          }
          return;
        }

        if (user.role !== 'volunteer') {
          actionArea.innerHTML = '<div class="status-msg info">Only volunteers can check in to events.</div>';
          return;
        }

        if (data.data.alreadyCheckedIn) {
          actionArea.innerHTML = `
            <button class="checkin-btn checkout-btn" onclick="checkOut(${gig.id})">Check Out</button>
            <div class="status-msg info" style="margin-top:12px;">You are currently checked in.</div>`;
        } else {
          actionArea.innerHTML = `<button class="checkin-btn" onclick="checkIn()">Check In</button>`;
        }
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('errorContent').style.display = 'block';
        document.getElementById('errorMsg').textContent = 'Failed to load event details.';
      }
    }

    async function checkIn() {
      try {
        const resp = await fetch(`/api/attendance/checkin/${token}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${authToken}` },
        });
        const data = await resp.json();
        const statusMsg = document.getElementById('statusMsg');
        if (data.success) {
          checkInTimestamp = new Date(data.data.attendance.checkInAt).getTime();
          statusMsg.className = 'status-msg success';
          statusMsg.textContent = 'Successfully checked in! You will be automatically checked out at the end of the event.';
          document.getElementById('actionArea').innerHTML = `
            <button class="checkin-btn checkout-btn" onclick="checkOut(${data.data.attendance.gigId})">Check Out Early</button>`;
        } else {
          statusMsg.className = 'status-msg error';
          statusMsg.textContent = data.message;
        }
      } catch (err) {
        document.getElementById('statusMsg').className = 'status-msg error';
        document.getElementById('statusMsg').textContent = 'Check-in failed. Please try again.';
      }
    }

    /* Pending check-out: opening the modal stores the gigId; confirmCheckOut
       calls the API. Cancel just closes the modal — no API call is made. */
    let pendingCheckoutGigId = null;
    let checkInTimestamp = null;

    function checkOut(gigId) {
      pendingCheckoutGigId = gigId;
      const elapsedEl = document.getElementById('coElapsed');
      if (checkInTimestamp) {
        const ms = Date.now() - checkInTimestamp;
        const h = Math.floor(ms / 3600000);
        const m = Math.floor((ms % 3600000) / 60000);
        elapsedEl.textContent = `Time checked in so far: ${h}h ${m}m`;
      } else {
        elapsedEl.textContent = '';
      }
      const btn = document.getElementById('coConfirmBtn');
      btn.disabled = false;
      btn.textContent = 'Yes, check me out';
      document.getElementById('coModal').classList.add('show');
    }

    function cancelCheckOut() {
      pendingCheckoutGigId = null;
      document.getElementById('coModal').classList.remove('show');
    }

    async function confirmCheckOut() {
      if (!pendingCheckoutGigId) return;
      const gigId = pendingCheckoutGigId;
      const btn = document.getElementById('coConfirmBtn');
      btn.disabled = true;
      btn.textContent = 'Checking out...';
      try {
        const resp = await fetch(`/api/attendance/checkout/${gigId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${authToken}` },
        });
        const data = await resp.json();
        const statusMsg = document.getElementById('statusMsg');
        document.getElementById('coModal').classList.remove('show');
        pendingCheckoutGigId = null;
        if (data.success) {
          statusMsg.className = 'status-msg success';
          statusMsg.textContent = `Checked out! Hours logged: ${fmt.hoursMin(data.data.hoursWorked)}.`;
          document.getElementById('actionArea').innerHTML = '<div class="status-msg success">Session complete. Thank you!</div>';
        } else {
          statusMsg.className = 'status-msg error';
          statusMsg.textContent = data.message;
        }
      } catch (err) {
        document.getElementById('statusMsg').className = 'status-msg error';
        document.getElementById('statusMsg').textContent = 'Check-out failed. Please try again.';
      }
    }

    loadEvent();
  </script>
</body>
</html>
