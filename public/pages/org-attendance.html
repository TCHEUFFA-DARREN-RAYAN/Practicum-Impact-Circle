<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance Tracking — ImpactCircle</title>
  <link rel="stylesheet" href="/css/base.css">
  <style>
    .page-container { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .page-header h1 { font-size: 1.5rem; color: #1e293b; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: #fff; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .stat-card .value { font-size: 1.8rem; font-weight: 700; color: #6366f1; }
    .stat-card .label { font-size: 0.85rem; color: #64748b; margin-top: 4px; }
    .section { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .section h2 { font-size: 1.1rem; margin-bottom: 16px; color: #1e293b; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 0.9rem; }
    th { background: #f8fafc; font-weight: 600; color: #475569; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .badge-green { background: #dcfce7; color: #166534; }
    .badge-red { background: #fef2f2; color: #991b1b; }
    .badge-blue { background: #dbeafe; color: #1e40af; }
    .qr-section { text-align: center; padding: 24px; }
    .qr-section img { max-width: 250px; border-radius: 12px; border: 2px solid #e2e8f0; }
    .qr-url { font-size: 0.8rem; color: #64748b; word-break: break-all; margin-top: 8px; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.9rem; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #4f46e5; }
    .gig-select { padding: 10px 16px; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 0.9rem; min-width: 200px; }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>
  <div class="page-container">
    <div class="page-header">
      <h1>Attendance Tracking</h1>
      <select class="gig-select" id="gigSelect" onchange="loadGigAttendance()">
        <option value="">Select an event...</option>
      </select>
    </div>

    <div id="content" style="display:none;">
      <div class="stats-grid">
        <div class="stat-card"><div class="value" id="statSignedUp">0</div><div class="label">Signed Up</div></div>
        <div class="stat-card"><div class="value" id="statAttended">0</div><div class="label">Attended</div></div>
        <div class="stat-card"><div class="value" id="statCheckedIn">0</div><div class="label">Currently In</div></div>
        <div class="stat-card"><div class="value" id="statAbsent">0</div><div class="label">Absent</div></div>
        <div class="stat-card"><div class="value" id="statHours">0</div><div class="label">Total Hours</div></div>
      </div>

      <div class="section qr-section">
        <h2>QR Code for Check-in</h2>
        <div id="qrCode"></div>
        <p class="qr-url" id="qrUrl"></p>
        <button class="btn btn-primary" id="toggleQrBtn" onclick="toggleQr()" style="margin-top:12px;">Toggle QR Active</button>
      </div>

      <div class="section">
        <h2>Attendance Records</h2>
        <table>
          <thead><tr><th>Volunteer</th><th>Email</th><th>Check-in</th><th>Check-out</th><th>Hours</th><th>Status</th></tr></thead>
          <tbody id="attendanceTable"></tbody>
        </table>
      </div>

      <div class="section">
        <h2>Absentees (Signed up but didn't attend)</h2>
        <table>
          <thead><tr><th>Volunteer</th><th>Email</th><th>Status</th></tr></thead>
          <tbody id="absenteeTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    const authToken = localStorage.getItem('ic_token');
    const headers = { Authorization: `Bearer ${authToken}`, 'Content-Type': 'application/json' };

    async function loadGigs() {
      const resp = await fetch('/api/orgs/me/gigs-stats', { headers });
      const data = await resp.json();
      if (!data.success) return;
      const select = document.getElementById('gigSelect');
      data.data.gigs.forEach(g => {
        const opt = document.createElement('option');
        opt.value = g.id;
        opt.textContent = `${g.title} (${g.startDate})${g.isPast ? ' [Past]' : ''}`;
        select.appendChild(opt);
      });

      const pathGigId = window.location.pathname.split('/org/attendance/')[1];
      if (pathGigId) {
        select.value = pathGigId;
        loadGigAttendance();
      }
    }

    async function loadGigAttendance() {
      const gigId = document.getElementById('gigSelect').value;
      if (!gigId) { document.getElementById('content').style.display = 'none'; return; }

      document.getElementById('content').style.display = 'block';

      const [attResp, qrResp] = await Promise.all([
        fetch(`/api/orgs/me/attendance/${gigId}`, { headers }),
        fetch(`/api/attendance/gig/${gigId}/qr`, { headers }),
      ]);

      const attData = await attResp.json();
      if (attData.success) {
        const { attendances, absentees, stats } = attData.data;
        document.getElementById('statSignedUp').textContent = stats.totalSignedUp;
        document.getElementById('statAttended').textContent = stats.totalAttended;
        document.getElementById('statCheckedIn').textContent = stats.currentlyCheckedIn;
        document.getElementById('statAbsent').textContent = stats.totalAbsent;
        document.getElementById('statHours').textContent = stats.totalHours;

        const tbody = document.getElementById('attendanceTable');
        tbody.innerHTML = attendances.map(a => {
          const name = a.volunteer?.volunteerProfile ? `${a.volunteer.volunteerProfile.firstName || ''} ${a.volunteer.volunteerProfile.lastName || ''}` : 'Unknown';
          const checkin = new Date(a.checkInAt).toLocaleString();
          const checkout = a.checkOutAt ? new Date(a.checkOutAt).toLocaleString() : '—';
          const status = a.checkOutAt ? (a.autoCheckedOut ? '<span class="badge badge-blue">Auto</span>' : '<span class="badge badge-green">Done</span>') : '<span class="badge badge-green">Active</span>';
          return `<tr><td>${name}</td><td>${a.volunteer?.email || ''}</td><td>${checkin}</td><td>${checkout}</td><td>${a.hoursWorked || '—'}</td><td>${status}</td></tr>`;
        }).join('') || '<tr><td colspan="6" style="text-align:center;color:#94a3b8;">No attendance records yet.</td></tr>';

        const absTbody = document.getElementById('absenteeTable');
        absTbody.innerHTML = absentees.map(a => {
          const name = a.volunteer?.volunteerProfile ? `${a.volunteer.volunteerProfile.firstName || ''} ${a.volunteer.volunteerProfile.lastName || ''}` : 'Unknown';
          return `<tr><td>${name}</td><td>${a.volunteer?.email || ''}</td><td><span class="badge badge-red">Absent</span></td></tr>`;
        }).join('') || '<tr><td colspan="3" style="text-align:center;color:#94a3b8;">No absentees.</td></tr>';
      }

      const qrData = await qrResp.json();
      if (qrData.success) {
        document.getElementById('qrCode').innerHTML = `<img src="${qrData.data.qrCode}" alt="QR Code">`;
        document.getElementById('qrUrl').textContent = qrData.data.checkinUrl;
        document.getElementById('toggleQrBtn').textContent = qrData.data.isActive ? 'Disable QR' : 'Enable QR';
      } else {
        document.getElementById('qrCode').innerHTML = '<p style="color:#94a3b8;">Generate QR by selecting an event.</p>';
      }
    }

    async function toggleQr() {
      const gigId = document.getElementById('gigSelect').value;
      if (!gigId) return;
      await fetch(`/api/attendance/gig/${gigId}/qr/toggle`, { method: 'PATCH', headers });
      loadGigAttendance();
    }

    loadGigs();
  </script>
</body>
</html>
