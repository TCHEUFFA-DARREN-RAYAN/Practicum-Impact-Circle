<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reward Catalogue | ImpactCircle</title>
  <meta name="description" content="Redeem your verified volunteer points for CSR-sponsored rewards, discounts, event passes, and certificates on ImpactCircle.">
  <link rel="stylesheet" href="/css/base.css">
</head>
<body>
<nav id="navbar"></nav>
<div class="page-content">
  <div class="container">
    <div class="page-header">
      <h1> Reward Catalogue</h1>
      <p class="text-muted">Redeem your volunteer points for exclusive perks, discounts, and recognition.</p>
    </div>

    <div id="statsBar" class="card mb-4" style="display:flex;gap:2rem;align-items:center;flex-wrap:wrap">
      <div><div class="stat-label">Your Points</div><div style="font-size:1.75rem;font-weight:800;color:var(--primary)" id="myPoints">—</div></div>
      <div><div class="stat-label">Verified Hours</div><div style="font-size:1.75rem;font-weight:800;color:var(--success)" id="myHours">—</div></div>
      <div style="flex:1"></div>
      <div class="text-muted" style="font-size:0.8rem">Earn more points by completing verified volunteer gigs</div>
    </div>

    <div class="filters mb-4">
      <div class="filters-row">
        <div class="filter-group">
          <label>Filter by Category</label>
          <select id="catFilter"><option value="">All Categories</option></select>
        </div>
        <div class="filter-group">
          <label>Eligibility</label>
          <select id="eligFilter"><option value="">All Rewards</option><option value="eligible">Eligible Only</option></select>
        </div>
      </div>
    </div>

    <div class="grid grid-auto" id="rewardsGrid">
      <div class="loading-overlay" style="grid-column:1/-1"><div class="spinner spinner-lg"></div></div>
    </div>
  </div>
</div>

<!-- Redeem Confirm Modal -->
<div class="modal-backdrop" id="redeemModal">
  <div class="modal">
    <div class="modal-header"><h3>Confirm Redemption</h3><button class="modal-close" onclick="closeRedeem()">×</button></div>
    <div class="modal-body">
      <div id="redeemAlert"></div>
      <div id="redeemInfo"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeRedeem()">Cancel</button>
      <button class="btn btn-primary" id="confirmRedeem">Redeem Now </button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
API.requireAuth('volunteer');
let allRewards = [], myPoints = 0, myHours = 0, pendingRewardId = null;

async function load() {
  try {
    const [rewardsRes, dashRes] = await Promise.all([API.get('/rewards'), API.get('/volunteers/me/dashboard')]);
    allRewards = rewardsRes.data.rewards;
    const { stats } = dashRes.data;
    myPoints = stats.totalPoints;
    myHours = stats.totalVerifiedHours;

    document.getElementById('myPoints').textContent = myPoints.toLocaleString() + ' pts';
    document.getElementById('myHours').textContent = myHours.toFixed(1) + 'h';

    const cats = [...new Set(allRewards.map(r => r.categoryId?.name).filter(Boolean))];
    document.getElementById('catFilter').innerHTML = '<option value="">All Categories</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');

    renderRewards(allRewards);
  } catch (err) { Toast.error('Failed to load rewards: ' + err.message); }
}

function renderRewards(rewards) {
  const catVal = document.getElementById('catFilter').value;
  const eligVal = document.getElementById('eligFilter').value;
  let filtered = rewards.filter(r => (!catVal || r.categoryId?.name === catVal) && (!eligVal || (eligVal === 'eligible' && r.eligible)));

  document.getElementById('rewardsGrid').innerHTML = filtered.length ? filtered.map(r => {
    const typeIcons = { discount: '️', eventPass: '️', perk: '', badge: '', certificate: '' };
    return `
      <div class="card card-hover" style="display:flex;flex-direction:column;gap:0.875rem;border-top:3px solid ${r.eligible ? 'var(--success)' : 'var(--border)'}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <span style="font-size:2rem">${typeIcons[r.type] || ''}</span>
          <span class="badge ${r.eligible ? 'badge-verified' : 'badge-rejected'}">${r.eligible ? ' Eligible' : ' Not eligible'}</span>
        </div>
        <div>
          <div style="font-weight:700;margin-bottom:0.25rem">${r.name}</div>
          <div style="font-size:0.8rem;color:var(--text-muted)">${r.description}</div>
        </div>
        <div style="font-size:0.775rem;color:var(--text-muted)">
          <div>Sponsor: <strong>${r.sponsorName || 'Platform'}</strong></div>
          <div style="margin-top:0.25rem">Category: ${r.categoryId?.icon || ''} <strong>${r.categoryId?.name || '—'}</strong></div>
        </div>
        <div style="background:var(--bg);border-radius:var(--radius-sm);padding:0.75rem;font-size:0.8rem">
          <div style="display:flex;justify-content:space-between;margin-bottom:0.25rem">
            <span>Points required</span><strong style="color:${myPoints >= r.pointsRequired ? 'var(--success)' : 'var(--danger)'}">${r.pointsRequired} pts</strong>
          </div>
          <div style="display:flex;justify-content:space-between">
            <span>Category hours</span><strong style="color:${(myHours) >= r.categoryHoursRequired ? 'var(--success)' : 'var(--danger)'}">${r.categoryHoursRequired}h needed</strong>
          </div>
        </div>
        ${!r.eligible ? `<div style="font-size:0.775rem;color:var(--danger)">${r.ineligibilityReason || ''}</div>` : ''}
        <button class="btn ${r.eligible ? 'btn-primary' : 'btn-secondary'}" ${r.eligible ? `onclick="openRedeem('${r._id}','${r.name.replace(/'/g,"\\'")}',${r.pointsRequired})"` : 'disabled'}>
          ${r.eligible ? 'Redeem' : 'Not yet eligible'}
        </button>
      </div>
    `;
  }).join('') : `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon"></div><h3>No rewards found</h3><p>Try adjusting your filters or earn more volunteer hours!</p></div>`;
}

document.getElementById('catFilter').addEventListener('change', () => renderRewards(allRewards));
document.getElementById('eligFilter').addEventListener('change', () => renderRewards(allRewards));

function openRedeem(rewardId, name, cost) {
  pendingRewardId = rewardId;
  document.getElementById('redeemAlert').innerHTML = '';
  document.getElementById('redeemInfo').innerHTML = `
    <p>You are about to redeem <strong>${name}</strong>.</p>
    <div class="alert alert-warning" style="margin-top:1rem">️ This will deduct <strong>${cost} points</strong> from your balance. Current balance: <strong>${myPoints} pts</strong>.</div>
  `;
  document.getElementById('redeemModal').classList.add('open');
}

document.getElementById('confirmRedeem').addEventListener('click', async () => {
  if (!pendingRewardId) return;
  const btn = document.getElementById('confirmRedeem');
  btn.disabled = true; btn.innerHTML = '<div class="spinner"></div>';
  try {
    await API.post(`/rewards/${pendingRewardId}/redeem`, {});
    Toast.success('Reward redeemed successfully! ');
    closeRedeem();
    load();
  } catch (err) {
    document.getElementById('redeemAlert').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
    btn.disabled = false; btn.textContent = 'Redeem Now ';
  }
});

function closeRedeem() { document.getElementById('redeemModal').classList.remove('open'); pendingRewardId = null; }

load();
</script>
</body>
</html>
