<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Dashboard | ImpactCircle</title>
  <link rel="stylesheet" href="/css/base.css">
  <style>
    .dash-header { margin-bottom: 2rem; }
    .dash-header h1 { font-size: 1.625rem; font-weight: 700; color: var(--text); }
    .dash-header p { color: var(--text-muted); font-size: 0.875rem; margin-top: 0.25rem; }
    .dash-header-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat-card-pro {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      box-shadow: var(--shadow);
      display: flex; align-items: flex-start; gap: 1rem;
    }
    .stat-icon-wrap { width: 44px; height: 44px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .stat-icon-wrap svg { width: 22px; height: 22px; }
    .si-blue   { background: #dbeafe; color: #1e40af; }
    .si-green  { background: #dcfce7; color: #16a34a; }
    .si-purple { background: #ede9fe; color: #7c3aed; }
    .si-orange { background: #ffedd5; color: #ea580c; }
    .stat-info { flex: 1; min-width: 0; }
    .stat-info-label { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.375rem; }
    .stat-info-value { font-size: 1.75rem; font-weight: 800; color: var(--text); line-height: 1; }
    .stat-info-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }

    .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; align-items: start; }
    .section-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 1rem; }

    .task-item { padding: 0.875rem 0; border-bottom: 1px solid var(--border); }
    .task-item:last-child { border-bottom: none; }
    .task-item-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; margin-bottom: 0.375rem; }
    .task-title { font-weight: 600; font-size: 0.875rem; color: var(--text); }
    .task-date { font-size: 0.75rem; color: var(--text-muted); }

    .app-item { padding: 0.75rem 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
    .app-item:last-child { border-bottom: none; }
    .app-title { font-weight: 600; font-size: 0.85rem; color: var(--text); }
    .app-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.125rem; }

    .reward-item { padding: 0.75rem 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
    .reward-item:last-child { border-bottom: none; }
    .reward-name { font-weight: 600; font-size: 0.85rem; color: var(--text); }
    .reward-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.125rem; }

    .cat-row { display: flex; justify-content: space-between; align-items: center; padding: 0.625rem 0; border-bottom: 1px solid var(--border); }
    .cat-row:last-child { border-bottom: none; }
    .cat-bar-wrap { width: 90px; height: 6px; background: var(--border); border-radius: 3px; }
    .cat-bar { height: 100%; background: var(--primary); border-radius: 3px; }
    .cat-hrs { font-weight: 700; font-size: 0.825rem; width: 36px; text-align: right; }

    @media (max-width: 900px) { .stats-row { grid-template-columns: repeat(2, 1fr); } .content-grid { grid-template-columns: 1fr; } }
    @media (max-width: 480px) { .stats-row { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
<nav id="navbar"></nav>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<aside id="sidebar" class="sidebar"></aside>

<div class="page-content">
  <div class="container">

    <div class="dash-header">
      <div class="dash-header-row">
        <div>
          <h1 id="welcomeMsg">My Dashboard</h1>
          <p>Track your volunteer contributions and rewards</p>
        </div>
        <a href="/gigs" class="btn btn-primary">Browse Gigs</a>
      </div>
    </div>

    <div id="verifyBanner"></div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card-pro">
        <div class="stat-icon-wrap si-blue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <div class="stat-info">
          <div class="stat-info-label">Verified Hours</div>
          <div class="stat-info-value" id="statHours">—</div>
          <div class="stat-info-sub">All time</div>
        </div>
      </div>
      <div class="stat-card-pro">
        <div class="stat-icon-wrap si-green">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </div>
        <div class="stat-info">
          <div class="stat-info-label">Points Balance</div>
          <div class="stat-info-value" id="statPoints">—</div>
          <div class="stat-info-sub">Redeemable</div>
        </div>
      </div>
      <div class="stat-card-pro">
        <div class="stat-icon-wrap si-purple">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <div class="stat-info">
          <div class="stat-info-label">Gigs Applied</div>
          <div class="stat-info-value" id="statGigs">—</div>
          <div class="stat-info-sub">Total</div>
        </div>
      </div>
      <div class="stat-card-pro">
        <div class="stat-icon-wrap si-orange">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        </div>
        <div class="stat-info">
          <div class="stat-info-label">Gigs Completed</div>
          <div class="stat-info-value" id="statCompleted">—</div>
          <div class="stat-info-sub">Approved</div>
        </div>
      </div>
    </div>

    <!-- Main content grid -->
    <div class="content-grid">
      <!-- Left -->
      <div>
        <div class="card mb-4">
          <div class="card-header">
            <div class="card-title">Active Tasks</div>
          </div>
          <div id="activeTasks"><div class="loading-overlay"><div class="spinner"></div></div></div>
        </div>

        <div class="card">
          <div class="card-header">
            <div class="card-title">Hours by Category</div>
          </div>
          <div id="categoryBreakdown"><div class="loading-overlay"><div class="spinner"></div></div></div>
        </div>
      </div>

      <!-- Right -->
      <div>
        <div class="card mb-4">
          <div class="card-header">
            <div class="card-title">My Applications</div>
          </div>
          <div id="applications"><div class="loading-overlay"><div class="spinner"></div></div></div>
        </div>

        <div class="card">
          <div class="card-header">
            <div class="card-title">Available Rewards</div>
            <a href="/rewards" class="btn btn-ghost btn-sm">View all</a>
          </div>
          <div id="rewardsPreview"><div class="loading-overlay"><div class="spinner"></div></div></div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Task Modal -->
<div class="modal-backdrop" id="taskModal">
  <div class="modal">
    <div class="modal-header"><h3 id="taskModalTitle">Task Action</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body" id="taskModalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="taskModalConfirm">Confirm</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
API.requireAuth('volunteer');

const STATUS_LABEL = { accepted: 'Accepted', inProgress: 'In Progress', completed: 'Pending Approval', approved: 'Approved', rejected: 'Rejected' };
const STATUS_CLASS = { accepted: 'badge-primary', inProgress: 'badge-info', completed: 'badge-pending', approved: 'badge-verified', rejected: 'badge-rejected' };

async function load() {
  try {
    const { data } = await API.get('/volunteers/me/dashboard');
    const { profile, stats, applications, tasks, eligibleRewards } = data;

    document.getElementById('welcomeMsg').textContent = `Welcome back, ${profile?.firstName || 'Volunteer'}`;
    document.getElementById('statHours').textContent = stats.totalVerifiedHours.toFixed(1);
    document.getElementById('statPoints').textContent = stats.totalPoints.toLocaleString();
    document.getElementById('statGigs').textContent = stats.gigCount;
    document.getElementById('statCompleted').textContent = stats.approvedCount;

    const user = await API.get('/auth/me');
    const vs = user.data.user.verificationStatus;
    if (vs !== 'verified') {
      document.getElementById('verifyBanner').innerHTML = `
        <div class="alert alert-${vs === 'pending' ? 'warning' : 'danger'} mb-4" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem">
          <span>${vs === 'pending' ? 'Your account is pending admin verification. Upload documents to speed up the process.' : 'Verification rejected. Please visit your profile to resubmit documents.'}</span>
          <a href="/volunteer-profile" class="btn btn-sm btn-secondary">Go to Profile</a>
        </div>`;
    }

    // Active tasks
    const activeTasks = tasks.filter(t => ['accepted','inProgress','completed'].includes(t.status));
    document.getElementById('activeTasks').innerHTML = activeTasks.length
      ? activeTasks.map(t => `
        <div class="task-item">
          <div class="task-item-top">
            <div>
              <div class="task-title">${t.gigId?.title || 'Gig'}</div>
              <div class="task-date">${fmt.date(t.createdAt)}</div>
            </div>
            <span class="badge ${STATUS_CLASS[t.status]}">${STATUS_LABEL[t.status]}</span>
          </div>
          ${t.status === 'accepted' ? `<button class="btn btn-sm btn-primary mt-2" onclick="startTask('${t._id}')">Mark In Progress</button>` : ''}
          ${t.status === 'inProgress' ? `<button class="btn btn-sm btn-success mt-2" onclick="completeTask('${t._id}','${t.gigId?.title}')">Submit Completion</button>` : ''}
          ${t.status === 'completed' ? `<div class="alert alert-warning mt-2" style="padding:0.5rem 0.75rem;font-size:0.775rem">Awaiting organization approval (auto-approved after 30 days)</div>` : ''}
        </div>`).join('')
      : '<div class="text-center text-muted" style="padding:1.5rem;font-size:0.875rem">No active tasks. <a href="/gigs">Browse gigs</a> to get started.</div>';

    // Category breakdown
    const catHours = stats.categoryHours || {};
    const catKeys = Object.keys(catHours);
    const maxHrs = catKeys.length ? Math.max(...Object.values(catHours)) : 1;
    document.getElementById('categoryBreakdown').innerHTML = catKeys.length
      ? catKeys.map(k => `
        <div class="cat-row">
          <span style="font-size:0.825rem">${k.substring(0,22)}</span>
          <div style="display:flex;align-items:center;gap:0.625rem">
            <div class="cat-bar-wrap"><div class="cat-bar" style="width:${Math.min(100,(catHours[k]/maxHrs)*100)}%"></div></div>
            <span class="cat-hrs">${catHours[k]}h</span>
          </div>
        </div>`).join('')
      : '<div class="text-center text-muted" style="padding:1rem;font-size:0.875rem">Complete approved gigs to see your breakdown.</div>';

    // Applications
    document.getElementById('applications').innerHTML = applications.slice(0,6).length
      ? applications.slice(0,6).map(a => `
        <div class="app-item">
          <div>
            <div class="app-title">${a.gigId?.title || 'Gig'}</div>
            <div class="app-meta">${a.gigId?.orgId?.orgName || ''} · ${fmt.date(a.createdAt)}</div>
          </div>
          <span class="badge ${a.status === 'approved' ? 'badge-verified' : a.status === 'rejected' ? 'badge-rejected' : 'badge-pending'}">${a.status}</span>
        </div>`).join('')
      : '<div class="text-center text-muted" style="padding:1.5rem;font-size:0.875rem">No applications yet. <a href="/gigs">Browse gigs →</a></div>';

    // Rewards
    document.getElementById('rewardsPreview').innerHTML = eligibleRewards.slice(0,3).length
      ? eligibleRewards.slice(0,3).map(r => `
        <div class="reward-item">
          <div>
            <div class="reward-name">${r.name}</div>
            <div class="reward-meta">${r.pointsRequired} pts · ${r.sponsorName || 'Platform'}</div>
          </div>
          <a href="/rewards" class="btn btn-sm btn-primary">Redeem</a>
        </div>`).join('')
        + (eligibleRewards.length > 3 ? `<div style="padding:0.75rem 0;text-align:center"><a href="/rewards" class="btn btn-ghost btn-sm">View all ${eligibleRewards.length} rewards</a></div>` : '')
      : '<div class="text-center text-muted" style="padding:1.5rem;font-size:0.875rem">Keep volunteering to unlock rewards!</div>';

  } catch (err) { Toast.error('Failed to load dashboard: ' + err.message); }
}

let pendingTaskId = null;
async function startTask(taskId) {
  try { await API.patch(`/tasks/${taskId}/start`, {}); Toast.success('Task started!'); load(); }
  catch (err) { Toast.error(err.message); }
}
function completeTask(taskId, title) {
  pendingTaskId = taskId;
  document.getElementById('taskModalTitle').textContent = 'Submit Task Completion';
  document.getElementById('taskModalBody').innerHTML = `<p>Confirm that you have completed <strong>"${title}"</strong>.</p><p class="text-muted" style="font-size:0.875rem">The organization will receive a notification to verify your completion within 30 days.</p>`;
  document.getElementById('taskModal').classList.add('open');
}
document.getElementById('taskModalConfirm').addEventListener('click', async () => {
  if (!pendingTaskId) return;
  try { await API.patch(`/tasks/${pendingTaskId}/complete`, {}); Toast.success('Task submitted for approval!'); closeModal(); load(); }
  catch (err) { Toast.error(err.message); }
});
function closeModal() { document.getElementById('taskModal').classList.remove('open'); pendingTaskId = null; }
load();
</script>
<script src="/js/footer.js"></script></body>
</html>
