<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics | Admin | ImpactCircle</title>
  <link rel="stylesheet" href="/css/base.css">
</head>
<body>
<nav id="navbar"></nav>
<div class="page-content">
  <div class="container">
    <div class="page-header">
      <div class="page-header-row">
        <div><h1> Platform Analytics</h1><p class="text-muted">Key performance indicators and platform health metrics</p></div>
        <div style="display:flex;gap:0.75rem">
          <a href="/admin/analytics.csv" class="btn btn-secondary">⬇️ Export CSV</a>
          <a href="/admin" class="btn btn-secondary">← Admin Home</a>
        </div>
      </div>
    </div>

    <div class="grid grid-4 mb-4">
      <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-value" id="sUsers">—</div></div>
      <div class="stat-card"><div class="stat-label">Verified Volunteers</div><div class="stat-value" id="sVerified">—</div><div class="stat-sub" id="sPending"></div></div>
      <div class="stat-card"><div class="stat-label">Total Gigs</div><div class="stat-value" id="sGigs">—</div><div class="stat-sub" id="sOpenGigs"></div></div>
      <div class="stat-card"><div class="stat-label">Total Organizations</div><div class="stat-value" id="sOrgs">—</div></div>
      <div class="stat-card" style="grid-column:span 2"><div class="stat-label">Total Verified Hours</div><div class="stat-value" id="sHours">—</div><div class="stat-sub">Across all verified tasks</div></div>
      <div class="stat-card" style="border-top:3px solid var(--warning)" id="autoCard">
        <div class="stat-label">Auto-Approval Rate</div>
        <div class="stat-value" id="sAuto">—%</div>
        <div class="stat-sub">Target: &lt; 10%</div>
      </div>
      <div class="stat-card"><div class="stat-label">Auto-Approved Tasks</div><div class="stat-value" id="sAutoCount">—</div><div class="stat-sub" id="sTotalApproved"></div></div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:1rem">KPI Status</h3>
      <div id="kpiStatus"><div class="loading-overlay"><div class="spinner"></div></div></div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
API.requireAuth('admin');
(async () => {
  try {
    const { data } = await API.get('/admin/analytics');
    document.getElementById('sUsers').textContent = data.totalUsers;
    document.getElementById('sVerified').textContent = data.verifiedVolunteers;
    document.getElementById('sPending').textContent = `${data.pendingVerifications} pending`;
    document.getElementById('sGigs').textContent = data.totalGigs;
    document.getElementById('sOpenGigs').textContent = `${data.openGigs} open`;
    document.getElementById('sOrgs').textContent = data.totalOrgs;
    document.getElementById('sHours').textContent = data.totalVerifiedHours.toFixed(1) + 'h';
    document.getElementById('sAuto').textContent = data.autoApprovalRate + '%';
    document.getElementById('sAutoCount').textContent = data.autoApprovedTasks;
    document.getElementById('sTotalApproved').textContent = `of ${data.totalApprovedTasks} total approved`;

    if (data.autoApprovalRate >= 10) {
      document.getElementById('autoCard').style.borderColor = 'var(--danger)';
      document.getElementById('sAuto').style.color = 'var(--danger)';
    }

    const kpis = [
      { label: 'Verified Volunteer Hours', value: data.totalVerifiedHours, target: 5000, unit: 'h', higher: true },
      { label: 'Active Users', value: data.totalUsers, target: 500, unit: ' users', higher: true },
      { label: 'Gig Fill Rate', value: data.totalGigs > 0 ? Math.round((data.totalGigs - data.openGigs) / data.totalGigs * 100) : 0, target: 75, unit: '%', higher: true },
      { label: 'Auto-Approval Rate', value: data.autoApprovalRate, target: 10, unit: '%', higher: false },
      { label: 'CSR Partner Participation', value: 0, target: 5, unit: ' partners', higher: true },
    ];

    document.getElementById('kpiStatus').innerHTML = kpis.map(k => {
      const ok = k.higher ? k.value >= k.target : k.value <= k.target;
      const pct = Math.min(100, k.higher ? (k.value / k.target) * 100 : (k.target === 0 ? 100 : Math.max(0, 100 - (k.value / k.target) * 100)));
      return `
        <div style="margin-bottom:1.25rem">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.375rem">
            <span style="font-size:0.875rem;font-weight:600">${k.label}</span>
            <span style="font-size:0.875rem;color:${ok ? 'var(--success)' : 'var(--warning)'};font-weight:700">${k.value}${k.unit} / ${k.target}${k.unit} target ${ok ? '' : '⏳'}</span>
          </div>
          <div style="height:8px;background:var(--border);border-radius:4px">
            <div style="width:${pct}%;height:100%;background:${ok ? 'var(--success)' : 'var(--warning)'};border-radius:4px;transition:width 0.5s"></div>
          </div>
        </div>
      `;
    }).join('');
  } catch (err) { Toast.error(err.message); }
})();
</script>
</body>
</html>
