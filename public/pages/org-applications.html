<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volunteer Applications | ImpactCircle</title>
  <link rel="stylesheet" href="/css/base.css">
  <style>
    /* Gig rows */
    .gig-row {
      border:1px solid var(--border); border-radius:12px; background:#fff;
      margin-bottom:0.875rem; overflow:hidden;
    }
    .gig-row-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:1rem 1.25rem; cursor:pointer; gap:1rem; flex-wrap:wrap;
      transition:background 0.12s;
    }
    .gig-row-header:hover { background:#f8fafc; }
    .gig-row-header.open { background:#f0f6ff; }
    .gig-row-info { flex:1; min-width:0; }
    .gig-row-title { font-weight:700; font-size:0.95rem; margin-bottom:0.25rem; }
    .gig-row-meta { font-size:0.8rem; color:var(--text-muted); display:flex; gap:0.75rem; flex-wrap:wrap; }
    .gig-row-badges { display:flex; gap:0.5rem; flex-wrap:wrap; align-items:center; }
    .badge { font-size:0.75rem; font-weight:600; padding:3px 10px; border-radius:20px; }
    .badge-pending  { background:#fef9c3; color:#854d0e; }
    .badge-total    { background:#eff6ff; color:#1d4ed8; }
    .badge-approved { background:#dcfce7; color:#166534; }
    .chevron { transition:transform 0.2s; flex-shrink:0; }
    .gig-row-header.open .chevron { transform:rotate(180deg); }

    /* Applications panel */
    .apps-panel { display:none; border-top:1px solid var(--border); padding:1.25rem; }
    .apps-panel.open { display:block; }

    .filter-bar { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1rem; align-items:center; }
    .filter-btn { padding:0.3rem 0.75rem; border-radius:20px; border:1px solid var(--border); font-size:0.8rem; cursor:pointer; background:#fff; transition:all 0.12s; }
    .filter-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }

    /* Application card */
    .app-card {
      border:1px solid var(--border); border-radius:10px; padding:1rem;
      background:#fafcff; margin-bottom:0.75rem; display:flex; gap:1rem; align-items:flex-start;
    }
    .vol-av {
      width:42px; height:42px; border-radius:50%; background:var(--primary);
      display:flex; align-items:center; justify-content:center;
      font-size:1rem; font-weight:700; color:#fff; overflow:hidden; flex-shrink:0;
    }
    .vol-av img { width:100%; height:100%; object-fit:cover; }
    .app-body { flex:1; min-width:0; }
    .app-name { font-weight:700; font-size:0.9rem; margin-bottom:0.2rem; }
    .app-meta { font-size:0.78rem; color:var(--text-muted); margin-bottom:0.5rem; display:flex; gap:0.625rem; flex-wrap:wrap; }
    .vol-stats { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:0.625rem; }
    .vs-chip { font-size:0.73rem; font-weight:600; padding:2px 8px; border-radius:20px;
      background:#f1f5f9; color:#475569; }
    .vs-chip.ok { background:#dcfce7; color:#166534; }
    .vs-chip.warn { background:#fef9c3; color:#854d0e; }
    .app-note { font-size:0.82rem; color:#555; background:#f8fafc; padding:0.5rem 0.75rem;
      border-radius:8px; margin-bottom:0.625rem; border-left:3px solid var(--border); }
    .app-actions { display:flex; gap:0.5rem; flex-wrap:wrap; margin-top:0.5rem; }
    .status-badge { display:inline-block; padding:2px 10px; border-radius:20px; font-size:0.75rem; font-weight:700; }
    .status-pending  { background:#fef9c3; color:#854d0e; }
    .status-approved { background:#dcfce7; color:#166534; }
    .status-rejected { background:#fee2e2; color:#991b1b; }

    .empty-state { text-align:center; padding:2rem 1rem; color:var(--text-muted); }
    .global-filter { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1.25rem; align-items:center; }
    .global-filter input { margin-left:auto; padding:0.375rem 0.75rem; border:1px solid var(--border); border-radius:8px; font-size:0.875rem; min-width:180px; }
  </style>
</head>
<body>
<nav id="navbar"></nav>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<aside id="sidebar" class="sidebar"></aside>
<div class="page-content">
  <div class="container">
    <div class="page-header">
      <h1>Volunteer Applications</h1>
      <p class="text-muted">Select a gig to review its applications</p>
    </div>

    <div class="global-filter">
      <input type="search" id="gigSearch" placeholder="Search gigs..." oninput="renderGigs()">
    </div>

    <div id="gigList">
      <div style="text-align:center;padding:3rem"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/footer.js"></script>
<script>
API.requireAuth('org');

let gigsData = [];
let openGigId = null;

/* Build initials avatar */
function initials(name) {
  return (name || '?').split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();
}

/* Render gig list */
function renderGigs() {
  const q = (document.getElementById('gigSearch').value || '').toLowerCase();
  let list = gigsData;
  if (q) list = list.filter(g => (g.title || '').toLowerCase().includes(q));

  if (!list.length) {
    document.getElementById('gigList').innerHTML = '<div class="empty-state">No gigs found.</div>';
    return;
  }

  document.getElementById('gigList').innerHTML = list.map(g => {
    const pending  = (g.applications || []).filter(a => a.status === 'pending').length;
    const approved = (g.applications || []).filter(a => a.status === 'approved').length;
    const total    = (g.applications || []).length;
    const isOpen   = openGigId === g.id;
    return `
    <div class="gig-row" id="gig-row-${g.id}">
      <div class="gig-row-header${isOpen ? ' open' : ''}" onclick="toggleGig(${g.id})">
        <div class="gig-row-info">
          <div class="gig-row-title">${g.title}</div>
          <div class="gig-row-meta">
            ${g.startDate ? `<span>${new Date(g.startDate + 'T00:00:00').toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'})}</span>` : ''}
            ${g.locationAddress || g.locationType === 'remote' ? `<span>${g.locationType === 'remote' ? 'Remote' : g.locationAddress}</span>` : ''}
          </div>
        </div>
        <div class="gig-row-badges">
          <span class="badge badge-total">${total} total</span>
          ${pending  > 0 ? `<span class="badge badge-pending">${pending} pending</span>` : ''}
          ${approved > 0 ? `<span class="badge badge-approved">${approved} approved</span>` : ''}
        </div>
        <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="apps-panel${isOpen ? ' open' : ''}" id="panel-${g.id}">
        ${renderAppsPanel(g)}
      </div>
    </div>`;
  }).join('');
}

function renderAppsPanel(g) {
  const apps = g.applications || [];
  if (!apps.length) return '<div class="empty-state">No applications for this gig yet.</div>';

  const fBtns = ['all','pending','approved','rejected'].map(s =>
    `<button class="filter-btn${s==='all'?' active':''}" onclick="filterApps(${g.id},'${s}',this)">${s.charAt(0).toUpperCase()+s.slice(1)}</button>`
  ).join('');

  const cards = apps.map(a => renderAppCard(a, g.id)).join('');
  return `
    <div class="filter-bar" id="filter-bar-${g.id}">${fBtns}</div>
    <div id="apps-${g.id}">${cards}</div>`;
}

function renderAppCard(a, gigId) {
  const v   = a.volunteer || {};
  const vp  = v.volunteerProfile || {};
  const name = `${v.firstName || ''} ${v.lastName || ''}`.trim() || v.email || 'Volunteer';
  const avatarSrc = v.avatarUrl || vp.avatarUrl;

  const chips = [];
  if (vp.verifiedHours  != null) chips.push(`<span class="vs-chip ok">${vp.verifiedHours}h verified</span>`);
  if (vp.points         != null) chips.push(`<span class="vs-chip">${vp.points} pts</span>`);
  if (vp.country)                chips.push(`<span class="vs-chip">${vp.country}</span>`);
  if (vp.backgroundCheck === 'verified') chips.push(`<span class="vs-chip ok">BG checked</span>`);
  else if (vp.backgroundCheck === 'pending') chips.push(`<span class="vs-chip warn">BG pending</span>`);
  if (vp.languages && vp.languages.length) chips.push(`<span class="vs-chip">${vp.languages.slice(0,2).join(', ')}</span>`);
  if (vp.skills && vp.skills.length) chips.push(`<span class="vs-chip">${vp.skills.slice(0,2).join(', ')}</span>`);

  let actionBtns = '';
  if (a.status === 'pending') {
    actionBtns = `
      <button class="btn btn-sm btn-primary" onclick="decide(${a.id},'approved',${gigId})">Approve</button>
      <button class="btn btn-sm btn-danger"  onclick="decide(${a.id},'rejected',${gigId})">Reject</button>`;
  } else if (a.status === 'approved') {
    actionBtns = `
      <button class="btn btn-sm btn-secondary" onclick="decide(${a.id},'pending',${gigId})">Move to Pending</button>
      <button class="btn btn-sm btn-danger"    onclick="decide(${a.id},'rejected',${gigId})">Revoke Approval</button>`;
  } else if (a.status === 'rejected') {
    actionBtns = `
      <button class="btn btn-sm btn-secondary" onclick="decide(${a.id},'pending',${gigId})">Reconsider</button>`;
  }

  return `
  <div class="app-card" id="app-${a.id}" data-status="${a.status}">
    <div class="vol-av">
      ${avatarSrc ? `<img src="${avatarSrc}" alt="${name}">` : initials(name)}
    </div>
    <div class="app-body">
      <div class="app-name">${name}
        <span class="status-badge status-${a.status}" style="margin-left:0.5rem">${a.status.charAt(0).toUpperCase()+a.status.slice(1)}</span>
      </div>
      <div class="app-meta">
        <span>${v.email || ''}</span>
        ${a.appliedAt ? `<span>Applied ${new Date(a.appliedAt).toLocaleDateString()}</span>` : ''}
      </div>
      ${chips.length ? `<div class="vol-stats">${chips.join('')}</div>` : ''}
      ${a.coverLetter ? `<div class="app-note">${a.coverLetter}</div>` : ''}
      <div class="app-actions">${actionBtns}</div>
    </div>
  </div>`;
}

function filterApps(gigId, status, btn) {
  document.querySelectorAll(`#filter-bar-${gigId} .filter-btn`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll(`#apps-${gigId} .app-card`).forEach(card => {
    card.style.display = (status === 'all' || card.dataset.status === status) ? '' : 'none';
  });
}

function toggleGig(gigId) {
  if (openGigId === gigId) {
    openGigId = null;
  } else {
    openGigId = gigId;
  }
  renderGigs();
}

async function decide(appId, decision, gigId) {
  try {
    await API.patch(`/gigs/applications/${appId}/decide`, { decision });
    await loadGig(gigId);
    renderGigs();
  } catch (e) {
    alert(e.message || 'Could not update application.');
  }
}

async function loadGig(gigId) {
  try {
    const { data } = await API.get(`/orgs/me/applications?gigId=${gigId}`);
    const idx = gigsData.findIndex(g => g.id === gigId);
    if (idx !== -1 && data.applications) {
      gigsData[idx].applications = data.applications;
    }
  } catch {}
}

async function load() {
  try {
    const { data } = await API.get('/orgs/me/applications');
    /* Group by gig */
    const gigMap = {};
    (data.applications || []).forEach(a => {
      const gig = a.gig || {};
      if (!gigMap[gig.id]) {
        gigMap[gig.id] = { ...gig, applications: [] };
      }
      gigMap[gig.id].applications.push(a);
    });

    const today = new Date().toISOString().slice(0, 10);
    gigsData = Object.values(gigMap).sort((a, b) => {
      const aActive = !a.endDate || a.endDate >= today;
      const bActive = !b.endDate || b.endDate >= today;
      if (aActive !== bActive) return aActive ? -1 : 1;
      return (b.applications.filter(x => x.status === 'pending').length) -
             (a.applications.filter(x => x.status === 'pending').length);
    });

    /* Auto-open if a specific gig was linked */
    const params = new URLSearchParams(location.search);
    const linked = params.get('gig');
    if (linked) openGigId = parseInt(linked);

    renderGigs();
  } catch (e) {
    document.getElementById('gigList').innerHTML = `<div class="empty-state">${e.message || 'Could not load applications.'}</div>`;
  }
}

load();
</script>
</body>
</html>
