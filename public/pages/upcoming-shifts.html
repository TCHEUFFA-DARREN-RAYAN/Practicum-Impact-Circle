<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upcoming Shifts | ImpactCircle</title>
  <link rel="stylesheet" href="/css/base.css">
  <style>
    .page-hero {
      position: relative; overflow: hidden;
      min-height: 260px; display: flex; align-items: center;
      color: white; text-align: center;
    }
    .ph-bg {
      position: absolute; inset: 0;
      background-image: url('https://images.unsplash.com/photo-1559027615-cd4628902d4a?w=1400&fit=crop&auto=format&q=80');
      background-size: cover; background-position: center 50%;
      filter: brightness(0.4);
    }
    .ph-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.42); }
    .ph-content {
      position: relative; z-index: 1;
      padding: calc(var(--nav-height) + 2.5rem) 1.5rem 4rem; width: 100%;
    }
    .ph-content h1 { font-size: clamp(1.7rem,4vw,2.5rem); font-weight: 800; color: white; margin-bottom: 0.6rem; }
    .ph-content p { font-size: 1rem; opacity: 0.92; max-width: 540px; margin: 0 auto; }
    .ph-wave { position: absolute; bottom: -1px; left: 0; right: 0; z-index: 2; }

    .shifts-section { padding: 2.5rem 0 4.5rem; }
    .filters-bar {
      display: flex; gap: 0.75rem; flex-wrap: wrap;
      margin-bottom: 2rem; align-items: center;
    }
    .filters-bar input, .filters-bar select { flex: 1 1 160px; min-width: 140px; max-width: 240px; }
    .shifts-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }
    .shift-card {
      background: white; border: 1px solid #e5e7eb;
      border-radius: 14px; padding: 1.5rem;
      transition: all 0.15s; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .shift-card:hover { box-shadow: 0 6px 20px rgba(14,165,233,0.12); transform: translateY(-2px); }
    .shift-meta { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .badge { display: inline-flex; align-items: center; padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; background: #EFF6FF; color: #0284C7; }
    .badge-inperson { background: #DCFCE7; color: #16A34A; }
    .badge-remote { background: #EDE9FE; color: #7C3AED; }
    .badge-morning { background: #fef9c3; color: #854d0e; }
    .badge-afternoon { background: #ffedd5; color: #9a3412; }
    .badge-evening { background: #ede9fe; color: #5b21b6; }
    .badge-hours { background: #e0f2fe; color: #0369a1; }
    .shift-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 0.35rem; }
    .shift-card .org-name { font-size: 0.825rem; color: #666; margin-bottom: 0.5rem; }
    .shift-detail { font-size: 0.825rem; color: #666; display: flex; align-items: center; gap: 0.35rem; margin-bottom: 0.25rem; }
    .shift-detail svg { flex-shrink: 0; }
    .shift-actions { margin-top: 1rem; display: flex; gap: 0.5rem; }
    #shifts-loading { text-align: center; padding: 4rem; color: #666; }
    #shifts-empty { display:none; text-align:center; padding: 4rem; color: #666; }
    .pagination { display: flex; gap: 0.5rem; justify-content: center; margin-top: 2rem; flex-wrap: wrap; }
  </style>
</head>
<body>
<nav id="navbar"></nav>

<div class="page-hero page-content">
  <div class="ph-bg"></div>
  <div class="ph-overlay"></div>
  <div class="ph-content container">
    <h1>Upcoming Volunteer Shifts</h1>
    <p>Browse available opportunities and find the perfect match for your schedule and interests.</p>
  </div>
  <div class="ph-wave">
    <svg viewBox="0 0 1440 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path fill="#ffffff" d="M0,58 C480,128 960,-28 1440,52 L1440,120 L0,120 Z"/>
    </svg>
  </div>
</div>

<main>
  <section class="shifts-section">
    <div class="container">
      <div class="filters-bar">
        <input type="text" id="search-input" placeholder="Search shifts…" />
        <select id="category-filter"><option value="">All Categories</option></select>
        <select id="time-filter">
          <option value="">Any Time of Day</option>
          <option value="morning">Morning (6 am – 12 pm)</option>
          <option value="afternoon">Afternoon (12 pm – 5 pm)</option>
          <option value="evening">Evening (5 pm – 10 pm)</option>
          <option value="flexible">Flexible</option>
        </select>
        <select id="hours-filter">
          <option value="">Any Hours</option>
          <option value="0,2">Under 2 hours</option>
          <option value="2,4">2 – 4 hours</option>
          <option value="4,8">4 – 8 hours</option>
          <option value="8,">8+ hours</option>
        </select>
        <select id="sort-filter">
          <option value="">Sort: Newest</option>
          <option value="date">Sort: Date (soon first)</option>
          <option value="hours">Sort: Hours (fewest first)</option>
          <option value="hoursDesc">Sort: Hours (most first)</option>
        </select>
        <button class="btn btn-primary" id="search-btn">Search</button>
      </div>

      <div id="shifts-loading">Loading shifts…</div>
      <div id="shifts-empty">No shifts found matching your criteria.</div>
      <div class="shifts-grid" id="shifts-grid"></div>
      <div class="pagination" id="pagination"></div>
    </div>
  </section>
</main>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/footer.js"></script>
<script>
  let currentPage = 1;
  const params = new URLSearchParams(window.location.search);

  async function loadCategories() {
    try {
      const { data } = await API.get('/public/categories');
      const cats = Array.isArray(data) ? data : (data.categories || data || []);
      const sel = document.getElementById('category-filter');
      cats.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id || c.name || c;
        opt.textContent = c.name || c;
        sel.appendChild(opt);
      });
      const catParam = params.get('category');
      if (catParam) {
        const match = cats.find(c => (c.name || c) === catParam);
        if (match) sel.value = match.id || match.name || match;
      }
    } catch {}
  }

  const TIME_BADGE = {
    morning:   ['badge-morning', 'Morning'],
    afternoon: ['badge-afternoon', 'Afternoon'],
    evening:   ['badge-evening', 'Evening'],
    flexible:  ['', 'Flexible'],
  };

  async function loadShifts(page = 1) {
    const loading = document.getElementById('shifts-loading');
    const grid    = document.getElementById('shifts-grid');
    const empty   = document.getElementById('shifts-empty');
    loading.style.display = 'block';
    grid.innerHTML = '';
    empty.style.display = 'none';

    const hoursVal = document.getElementById('hours-filter').value;
    const [minH, maxH] = hoursVal ? hoursVal.split(',') : ['', ''];

    const q = new URLSearchParams({
      page: String(page), limit: '12',
      search: document.getElementById('search-input').value.trim(),
      category: document.getElementById('category-filter').value,
      timeOfDay: document.getElementById('time-filter').value,
      sortBy: document.getElementById('sort-filter').value,
    });
    if (minH) q.set('minHours', minH);
    if (maxH) q.set('maxHours', maxH);
    ['search','category','timeOfDay','sortBy'].forEach(k => { if (!q.get(k)) q.delete(k); });

    try {
      const { data } = await API.get(`/gigs?${q}`);
      const gigs = data.gigs || [];
      loading.style.display = 'none';

      if (!gigs.length) { empty.style.display = 'block'; return; }

      const esc = (s) => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

      grid.innerHTML = gigs.map(g => {
        const cname  = g.category?.name || '';
        const tod    = g.timeOfDay ? TIME_BADGE[g.timeOfDay] || ['', g.timeOfDay] : null;
        const hours  = g.hoursPerOccurrence || g.estimatedHours;
        const recLine = g.isRecurring
          ? (g.recurrenceType === 'weekly' && g.recurrenceDays?.length
              ? `Every ${g.recurrenceDays.join(' & ')}`
              : g.recurrenceType ? g.recurrenceType.charAt(0).toUpperCase() + g.recurrenceType.slice(1)
              : 'Recurring')
          : null;
        const timeStr = g.startTime
          ? g.endTime ? `${g.startTime} – ${g.endTime}` : g.startTime
          : null;

        return `
        <div class="shift-card">
          <div class="shift-meta">
            ${cname ? `<span class="badge">${esc(cname)}</span>` : ''}
            ${tod ? `<span class="badge ${tod[0]}">${tod[1]}</span>` : ''}
            ${hours ? `<span class="badge badge-hours">${hours} hr${hours !== 1 ? 's' : ''}</span>` : ''}
          </div>
          <h3>${esc(g.title || 'Untitled Gig')}</h3>
          <div class="org-name">${esc(g.org?.orgName || '')}</div>
          ${g.startDate ? `<div class="shift-detail">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${esc(new Date(g.startDate + 'T00:00:00').toLocaleDateString('en-CA', {year:'numeric',month:'short',day:'numeric'}))}
            ${g.endDate && g.endDate !== g.startDate ? ` – ${esc(new Date(g.endDate + 'T00:00:00').toLocaleDateString('en-CA',{month:'short',day:'numeric'}))}` : ''}
          </div>` : ''}
          ${timeStr ? `<div class="shift-detail">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ${esc(timeStr)}
          </div>` : ''}
          ${recLine ? `<div class="shift-detail">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
            ${esc(recLine)}
          </div>` : ''}
          <div class="shift-detail">
            ${g.locationType === 'remote'
              ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg> Remote'
              : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> ' + esc(g.locationAddress || 'In-Person')}
          </div>
          <div class="shift-actions">
            <a href="/gigs/${g.id}" class="btn btn-primary btn-sm">View Details</a>
          </div>
        </div>`;
      }).join('');

      renderPagination(data.pages || 1, page);
    } catch {
      loading.textContent = 'Could not load shifts. Please try again later.';
    }
  }

  function renderPagination(totalPages, current) {
    const el = document.getElementById('pagination');
    if (totalPages <= 1) { el.innerHTML = ''; return; }
    let html = '';
    for (let i = 1; i <= totalPages; i++) {
      html += `<button class="btn btn-sm ${i === current ? 'btn-primary' : 'btn-secondary'}" onclick="goPage(${i})">${i}</button>`;
    }
    el.innerHTML = html;
  }

  function goPage(p) { currentPage = p; loadShifts(p); window.scrollTo(0, 0); }
  document.getElementById('search-btn').addEventListener('click', () => { currentPage = 1; loadShifts(1); });
  document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') { currentPage = 1; loadShifts(1); } });

  loadCategories();
  loadShifts(1);
</script>
</body>
</html>
