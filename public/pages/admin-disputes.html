<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Disputes | Admin | ImpactCircle</title>
  <link rel="stylesheet" href="/css/base.css">
</head>
<body>
<nav id="navbar"></nav>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<aside id="sidebar" class="sidebar"></aside>
<div class="page-content">
  <div class="container">
    <div class="page-header">
      <div class="page-header-row">
        <div><h1>️ Dispute Resolution</h1><p class="text-muted">Override rejected task decisions with a binding admin decision</p></div>
        <a href="/admin" class="btn btn-secondary">← Admin Home</a>
      </div>
    </div>
    <div class="alert alert-info mb-4">ℹ️ All admin overrides are logged permanently in the audit log with your admin ID, timestamp, and written reason.</div>
    <div id="disputeList"><div class="loading-overlay"><div class="spinner spinner-lg"></div></div></div>
  </div>
</div>

<div class="modal-backdrop" id="overrideModal">
  <div class="modal">
    <div class="modal-header"><h3>Admin Override</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div id="overrideAlert"></div>
      <div id="overrideInfo" class="mb-4"></div>
      <div class="form-group">
        <label for="overrideDecision">Override Decision <span class="required">*</span></label>
        <select id="overrideDecision"><option value="approved">Approve — Credit hours & points</option><option value="rejected">Reject — Confirm rejection</option></select>
      </div>
      <div class="form-group">
        <label for="overrideReason">Written Reason <span class="required">*</span></label>
        <textarea id="overrideReason" rows="4" placeholder="Provide a detailed written reason for this override (minimum 10 characters). This will be logged permanently."></textarea>
        <div class="form-hint">Min 10 characters. Recorded in immutable audit log.</div>
        <span class="field-error"></span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-warning" id="overrideBtn" onclick="submitOverride()">️ Apply Override</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
API.requireAuth('admin');
let currentTaskId = null;

async function load() {
  try {
    const { data } = await API.get('/admin/disputes');
    document.getElementById('disputeList').innerHTML = data.disputes.length ? data.disputes.map(t => `
      <div class="card mb-3">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem">
          <div style="flex:1">
            <div style="font-weight:700;margin-bottom:0.25rem">${t.gigId?.title || 'Unknown Gig'}</div>
            <div style="font-size:0.8rem;color:var(--text-muted)">
              Volunteer: ${t.volunteerId?.email || 'N/A'} · Org: ${t.orgId?.orgName || 'N/A'}
            </div>
            <div style="margin-top:0.5rem">
              <span class="badge badge-rejected">Rejected</span>
              ${t.rejectionReason ? `<div class="alert alert-danger" style="margin-top:0.5rem;padding:0.4rem 0.75rem;font-size:0.8rem">Org reason: ${t.rejectionReason}</div>` : ''}
            </div>
          </div>
          <button class="btn btn-warning btn-sm" onclick="openOverride('${t._id}','${(t.gigId?.title||'').replace(/'/g,"\\'")}','${(t.volunteerId?.email||'')}')">️ Override</button>
        </div>
      </div>
    `).join('') : '<div class="empty-state"><div class="empty-icon">️</div><h3>No disputes</h3><p>All tasks have been handled.</p></div>';
  } catch (err) { Toast.error(err.message); }
}

function openOverride(taskId, title, email) {
  currentTaskId = taskId;
  document.getElementById('overrideInfo').innerHTML = `<div class="alert alert-warning">Task: <strong>${title}</strong> · Volunteer: ${email}</div>`;
  document.getElementById('overrideReason').value = '';
  document.getElementById('overrideAlert').innerHTML = '';
  document.getElementById('overrideModal').classList.add('open');
}

async function submitOverride() {
  const decision = document.getElementById('overrideDecision').value;
  const reason = document.getElementById('overrideReason').value.trim();
  if (reason.length < 10) { Validator.showError(document.getElementById('overrideReason'), 'Minimum 10 characters required.'); return; }
  try {
    await API.patch(`/admin/disputes/${currentTaskId}/override`, { decision, reason });
    Toast.success('Override applied and logged.');
    closeModal(); load();
  } catch (err) { document.getElementById('overrideAlert').innerHTML = `<div class="alert alert-danger">${err.message}</div>`; }
}

function closeModal() { document.getElementById('overrideModal').classList.remove('open'); }
load();
</script>
<script src="/js/footer.js"></script></body>
</html>
