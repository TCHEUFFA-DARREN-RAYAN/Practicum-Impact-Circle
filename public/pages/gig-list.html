<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Gigs | ImpactCircle</title>
  <link rel="stylesheet" href="/css/base.css">
  <style>
    .gig-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.25rem; }
    .page-content .gig-card {
      overflow: hidden;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .gig-card-media {
      height: 132px;
      overflow: hidden;
      flex-shrink: 0;
      background: linear-gradient(135deg, #eaf4ff 0%, #e0f2fe 100%);
    }
    .gig-card-media img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .gig-card-body { padding: 1.15rem 1.25rem 0; flex: 1; display: flex; flex-direction: column; }
    .gig-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      padding: 0.875rem 1.25rem 1.15rem;
      border-top: 1px solid var(--border);
    }
    .pagination { display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin-top: 2rem; }
    .pagination-info { font-size: 0.85rem; color: var(--text-muted); }
    .cat-pill { border-radius: 999px; font-size: 0.75rem; font-weight: 700; padding: 0.25rem 0.65rem; }
    .cat-pill-1  { background: #e6f0ff; color: #0066ff; }
    .cat-pill-2  { background: #effff6; color: #00a344; }
    .cat-pill-3  { background: #fff9d6; color: #8a6a00; }
    .cat-pill-4  { background: #f3e8ff; color: #7e22ce; }
    .cat-pill-5  { background: #e0f7fa; color: #0e7490; }
    .cat-pill-6  { background: #e6f0ff; color: #0066ff; }
    .cat-pill-7  { background: #dcfce7; color: #166534; }
    .cat-pill-8  { background: #fff1e0; color: #c2410c; }
    .search-wrap { flex: 1; min-width: 180px; }
    @media (max-width: 600px) {
      .gig-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<nav id="navbar"></nav>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<aside id="sidebar" class="sidebar"></aside>

<div class="page-content">
  <div class="container">

    <!-- Page Header -->
    <div class="page-header page-header-row">
      <div>
        <h1>Browse Volunteer Gigs</h1>
        <p style="color:var(--text-muted);margin-top:0.25rem">Find opportunities that match your skills and schedule.</p>
      </div>
      <div id="resultsCount" style="font-size:0.875rem;color:var(--text-muted);white-space:nowrap;align-self:center"></div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <div class="filters-row">
        <!-- Category -->
        <div class="filter-group">
          <label for="filterCategory">Category</label>
          <select id="filterCategory">
            <option value="">All Categories</option>
          </select>
        </div>

        <!-- Location Type -->
        <div class="filter-group">
          <label for="filterLocation">Location</label>
          <select id="filterLocation">
            <option value="">All Types</option>
            <option value="in-person">In-Person</option>
            <option value="remote">Remote</option>
          </select>
        </div>

        <!-- Time of Day -->
        <div class="filter-group">
          <label for="filterTime">Time of Day</label>
          <select id="filterTime">
            <option value="">Any Time</option>
            <option value="morning">Morning</option>
            <option value="afternoon">Afternoon</option>
            <option value="evening">Evening</option>
            <option value="flexible">Flexible</option>
          </select>
        </div>

        <!-- Day of Week -->
        <div class="filter-group">
          <label for="filterDay">Day of Week</label>
          <select id="filterDay">
            <option value="">Any Day</option>
            <option value="Mon">Monday</option>
            <option value="Tue">Tuesday</option>
            <option value="Wed">Wednesday</option>
            <option value="Thu">Thursday</option>
            <option value="Fri">Friday</option>
            <option value="Sat">Saturday</option>
            <option value="Sun">Sunday</option>
          </select>
        </div>

        <!-- Verified Only -->
        <div class="filter-group">
          <label for="filterVerified">Access</label>
          <select id="filterVerified">
            <option value="">All Gigs</option>
            <option value="false">Open to All</option>
            <option value="true">Verified Only</option>
          </select>
        </div>

        <!-- Search -->
        <div class="filter-group search-wrap">
          <label for="filterSearch">Search</label>
          <input type="text" id="filterSearch" placeholder="Keywords, org name...">
        </div>

        <!-- Clear -->
        <div class="filter-group" style="justify-content:flex-end">
          <label style="visibility:hidden">x</label>
          <button class="btn btn-secondary btn-sm" id="clearFilters">Clear Filters</button>
        </div>
      </div>
    </div>

    <!-- Active filter tags -->
    <div id="activeFilters" style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:1rem"></div>

    <!-- Gig Grid / States -->
    <div id="gigContainer">
      <div class="loading-overlay">
        <div class="spinner spinner-lg"></div>
      </div>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="paginationArea" style="display:none">
      <button class="btn btn-secondary btn-sm" id="prevPage" disabled>&#x2190; Prev</button>
      <span class="pagination-info" id="pageInfo"></span>
      <button class="btn btn-secondary btn-sm" id="nextPage" disabled>Next &#x2192;</button>
    </div>

  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
  // ── State ──────────────────────────────────────────────────────────────────
  const _userRole = API.isLoggedIn() ? (API.getUser()?.role || '') : '';
  const _viewOnly = _userRole === 'org' || _userRole === 'admin';
  let currentPage = 1;
  const PAGE_SIZE = 12;
  let totalPages  = 1;
  let searchTimer = null;
  let categoryColorMap = {};
  let colorIndex = 0;

  // ── Helpers ────────────────────────────────────────────────────────────────
  function getCatPillClass(catId) {
    if (!categoryColorMap[catId]) {
      colorIndex = (colorIndex % 8) + 1;
      categoryColorMap[catId] = colorIndex;
    }
    return `cat-pill cat-pill-${categoryColorMap[catId]}`;
  }

  function fmtDate(d) {
    if (!d) return null;
    return new Date(d + 'T00:00:00').toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  const TIME_LABELS = { morning: 'Morning', afternoon: 'Afternoon', evening: 'Evening', flexible: 'Flexible', custom: 'Custom' };

  const SVG = {
    cal:  `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
    clk:  `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
    pin:  `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
    bldg: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>`,
  };

  // ── Load Categories ────────────────────────────────────────────────────────
  async function loadCategories() {
    try {
      const { data } = await API.get('/public/impact');
      const sel = document.getElementById('filterCategory');
      (data.categoryTotals || []).forEach(ct => {
        const opt = document.createElement('option');
        opt.value = ct.category.id;
        opt.textContent = ct.category.name;
        sel.appendChild(opt);
      });
      // Pre-select category from URL param (e.g. /gigs?category=Food+Security)
      const urlCat = new URLSearchParams(window.location.search).get('category');
      if (urlCat) {
        const opts = Array.from(sel.options);
        const match = opts.find(o => o.textContent.toLowerCase() === urlCat.toLowerCase());
        if (match) sel.value = match.value;
      }
    } catch (_) {}
  }

  // ── Build Query String ─────────────────────────────────────────────────────
  function buildQuery() {
    const params = new URLSearchParams();
    params.set('page', currentPage);
    params.set('limit', PAGE_SIZE);

    const cat      = document.getElementById('filterCategory').value;
    const loc      = document.getElementById('filterLocation').value;
    const time     = document.getElementById('filterTime').value;
    const day      = document.getElementById('filterDay').value;
    const verified = document.getElementById('filterVerified').value;
    const search   = document.getElementById('filterSearch').value.trim();

    if (cat)      params.set('category', cat);
    if (loc)      params.set('location', loc);
    if (time)     params.set('timeOfDay', time);
    if (day)      params.set('dayOfWeek', day);
    if (verified) params.set('verifiedOnly', verified);
    if (search)   params.set('search', search);

    return params.toString();
  }

  function gigPlaceholderImage(catName) {
    const s = String(catName || '').toLowerCase();
    const base = 'https://images.unsplash.com/photo-';
    const q = '?w=800&h=480&fit=crop&auto=format&q=80';
    if (/food|nutrition|hunger|meal/.test(s)) return base + '1488521787991-ed7bbaae773c' + q;
    if (/environment|climate|nature|garden|green|planet|earth/.test(s)) return base + '1441974231531-c6227db76b6e' + q;
    if (/youth|child|student|school|education|tutor|learn/.test(s)) return base + '1527525443983-6e60c75fff46' + q;
    if (/senior|elder|aging|older/.test(s)) return base + '1573496359142-b8d87734a5a2' + q;
    if (/newcomer|immigrant|cultural|integration|refugee/.test(s)) return base + '1529156069898-49953e39b3ac' + q;
    if (/women|woman|gender/.test(s)) return base + '1573497620053-ea30e8c2ccc8' + q;
    if (/shelter|housing|home/.test(s)) return base + '1560518883-ce09059eeffa' + q;
    if (/health|medical|wellness|care/.test(s)) return base + '1576091160399-112ba8d25d1d' + q;
    return base + '1559027615-cd4628902d4a' + q;
  }

  // ── Render Gig Card ────────────────────────────────────────────────────────
  function renderGigCard(gig) {
    const catName = gig.category?.name || 'General';
    const catId   = gig.category?.id || 'default';
    const pillCls = getCatPillClass(catId);
    const orgName = gig.org?.orgName || gig.organization?.orgName || '';

    const dateStr = fmtDate(gig.startDate);
    const dateEnd = gig.endDate && gig.endDate !== gig.startDate ? ` – ${fmtDate(gig.endDate)}` : '';

    const timeLabel = gig.timeOfDay && gig.timeOfDay !== 'flexible'
      ? (gig.startTime && gig.endTime ? `${gig.startTime} – ${gig.endTime}` : TIME_LABELS[gig.timeOfDay] || gig.timeOfDay)
      : null;

    const locStr = gig.locationType === 'remote'
      ? 'Remote'
      : (gig.locationAddress || gig.location || 'In-Person');

    const hours = gig.estimatedHours || gig.hoursRequired;
    const lockBadge = gig.verifiedOnly ? `<span class="verified-lock">Verified Only</span>` : '';

    const safeAlt = String(catName).replace(/"/g, '');
    const imgSrc = gigPlaceholderImage(catName);

    return `
      <div class="gig-card" onclick="goToGig('${gig.id}')">
        <div class="gig-card-media">
          <img src="${imgSrc}" alt="${safeAlt} volunteering" loading="lazy" width="400" height="210">
        </div>
        <div class="gig-card-body">
        <div class="gig-card-top">
          <div style="flex:1;min-width:0">
            <div class="gig-title truncate">${gig.title}</div>
            ${orgName ? `<div class="gig-org" style="display:flex;align-items:center;gap:0.3rem">${SVG.bldg} ${orgName}</div>` : ''}
          </div>
          <span class="${pillCls}" style="flex-shrink:0">${catName}</span>
        </div>

        ${gig.description ? `<p style="font-size:0.825rem;color:var(--text-muted);margin:0.5rem 0 0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${gig.description}</p>` : ''}

        <div class="gig-meta" style="margin-top:0.6rem;display:flex;flex-direction:column;gap:0.3rem">
          ${dateStr ? `<span class="gig-meta-item" style="display:flex;align-items:center;gap:0.35rem">${SVG.cal} ${dateStr}${dateEnd}</span>` : ''}
          ${timeLabel ? `<span class="gig-meta-item" style="display:flex;align-items:center;gap:0.35rem">${SVG.clk} ${timeLabel}</span>` : ''}
          <span class="gig-meta-item" style="display:flex;align-items:center;gap:0.35rem">${SVG.pin} ${locStr}</span>
          ${hours ? `<span class="gig-meta-item" style="display:flex;align-items:center;gap:0.35rem">${SVG.clk} ${hours} hr${hours !== 1 ? 's' : ''} per session</span>` : ''}
        </div>

        <div class="gig-card-footer">
          ${lockBadge || '<span></span>'}
          <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();goToGig('${gig.id}')">
            ${_viewOnly ? 'View &rarr;' : 'View &amp; Apply &rarr;'}
          </button>
        </div>
        </div>
      </div>
    `;
  }

  function goToGig(id) {
    window.location.href = '/gigs/' + id;
  }

  // ── Fetch & Render Gigs ────────────────────────────────────────────────────
  async function fetchGigs() {
    const container = document.getElementById('gigContainer');
    const pagination = document.getElementById('paginationArea');
    const resultsCount = document.getElementById('resultsCount');

    container.innerHTML = '<div class="loading-overlay"><div class="spinner spinner-lg"></div></div>';
    pagination.style.display = 'none';
    resultsCount.textContent = '';

    try {
      const { data } = await API.get('/gigs?' + buildQuery());
      const gigs  = data.gigs || data.results || [];
      const total = data.total || data.totalCount || gigs.length;
      totalPages  = data.pages || data.totalPages || Math.ceil(total / PAGE_SIZE) || 1;

      if (gigs.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">&#x1F50D;</div>
            <h3>No gigs found</h3>
            <p>Try adjusting your filters or search terms to find more opportunities.</p>
            <button class="btn btn-secondary" id="emptyReset">Clear Filters</button>
          </div>
        `;
        document.getElementById('emptyReset')?.addEventListener('click', resetFilters);
        return;
      }

      container.innerHTML = `<div class="gig-grid">${gigs.map(renderGigCard).join('')}</div>`;
      resultsCount.textContent = `${total} gig${total !== 1 ? 's' : ''} found`;

      // Pagination
      if (totalPages > 1) {
        pagination.style.display = 'flex';
        document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
        document.getElementById('prevPage').disabled = currentPage <= 1;
        document.getElementById('nextPage').disabled = currentPage >= totalPages;
      }

    } catch (err) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">&#x26A0;</div>
          <h3>Failed to load gigs</h3>
          <p>${err.message || 'Something went wrong. Please try again.'}</p>
          <button class="btn btn-primary" onclick="fetchGigs()">Retry</button>
        </div>
      `;
    }
  }

  // ── Filter Change Handling ─────────────────────────────────────────────────
  function onFilterChange() {
    currentPage = 1;
    fetchGigs();
  }

  function onSearchInput() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { currentPage = 1; fetchGigs(); }, 400);
  }

  function resetFilters() {
    document.getElementById('filterCategory').value = '';
    document.getElementById('filterLocation').value = '';
    document.getElementById('filterVerified').value = '';
    document.getElementById('filterSearch').value   = '';
    currentPage = 1;
    fetchGigs();
  }

  // ── Pagination ─────────────────────────────────────────────────────────────
  document.getElementById('prevPage').addEventListener('click', () => {
    if (currentPage > 1) { currentPage--; fetchGigs(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
  });
  document.getElementById('nextPage').addEventListener('click', () => {
    if (currentPage < totalPages) { currentPage++; fetchGigs(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
  });

  // ── Event Listeners ────────────────────────────────────────────────────────
  document.getElementById('filterCategory').addEventListener('change', onFilterChange);
  document.getElementById('filterLocation').addEventListener('change', onFilterChange);
  document.getElementById('filterVerified').addEventListener('change', onFilterChange);
  document.getElementById('filterSearch').addEventListener('input', onSearchInput);
  document.getElementById('clearFilters').addEventListener('click', resetFilters);

  // ── Init ───────────────────────────────────────────────────────────────────
  (async () => {
    await loadCategories();
    fetchGigs();
  })();
</script>
<script src="/js/footer.js"></script></body>
</html>
