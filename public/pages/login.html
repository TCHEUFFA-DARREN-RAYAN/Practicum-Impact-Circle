<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | ImpactCircle</title>
  <link rel="stylesheet" href="/css/base.css">
  <style>
    /* Pure white form chrome (avoid UA / color-scheme grey tint on the right column) */
    html { color-scheme: light; }
    body { background: #f2f8ff; }

    .auth-page {
      background: #f2f8ff;
      padding: 1.5rem;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }
    /* base.css adds a navy wash on .auth-page::before — remove it for this split layout */
    .auth-page:has(.login-wrap)::before {
      display: none;
    }

    /* ── Split container ── */
    .login-wrap {
      width: 100%;
      max-width: 960px;
      height: 650px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-radius: 20px;
      overflow: hidden;
      background-color: #ffffff;
      box-shadow: 0 20px 60px rgba(15,23,42,0.12), 0 4px 16px rgba(15,23,42,0.06);
      border: 1px solid #e2e8f0;
    }

    /* ── Image Slider ── */
    .slider-panel {
      position: relative;
      overflow: hidden;
      background: #071a3d;
    }
    .slider-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(7, 26, 61, 0) 35%, rgba(7, 26, 61, 0.5) 100%);
      pointer-events: none;
      z-index: 1;
    }
    .slider-img {
      position: absolute;
      inset: 0;
      z-index: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1s ease-in-out;
      will-change: opacity;
    }
    .slider-img.active { opacity: 1; }
    .slider-dots {
      position: absolute;
      bottom: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.5rem;
      z-index: 10;
    }
    .slider-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      border: none; cursor: pointer; padding: 0;
      transition: background 0.3s;
    }
    .slider-dot.active { background: #fff; }
    .slider-dot:hover:not(.active) { background: rgba(255,255,255,0.8); }

    /* ── Form panel ── */
    .form-panel {
      color-scheme: light;
      background: #ffffff !important;
      background-color: #ffffff !important;
      background-image: none !important;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2.75rem;
      overflow-y: auto;
    }
    .form-inner {
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      background: #ffffff !important;
      background-color: #ffffff !important;
    }

    /* Typography */
    .form-panel h1 {
      color: #071a3d;
      font-family: 'Poppins', 'Inter', sans-serif;
      font-size: 1.875rem;
      font-weight: 700;
      margin-bottom: 0.375rem;
      line-height: 1.2;
    }
    .form-panel .subtitle {
      color: #64748b;
      font-size: 0.9375rem;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    /* Labels */
    .form-panel label {
      color: #071a3d;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.375rem;
    }
    .label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.375rem;
    }
    .label-row label { margin-bottom: 0; }
    .forgot-link {
      font-size: 0.8125rem;
      font-weight: 500;
      color: #64748b;
      text-decoration: none;
      transition: color 0.15s;
    }
    .forgot-link:hover { color: #0066ff; text-decoration: none; }

    /* ── Login fields (flat, identical chrome — no nested borders) ── */
    #loginForm input.login-ctrl {
      width: 100%;
      box-sizing: border-box;
      margin: 0;
      padding: 14px 16px;
      font-size: 1rem;
      line-height: 1.45;
      font-family: inherit;
      color: #0f172a;
      background: #ffffff !important;
      background-color: #ffffff !important;
      background-image: none !important;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      -webkit-appearance: none;
      appearance: none;
    }
    #loginForm input.login-ctrl::placeholder {
      color: #94a3b8;
    }
    #loginForm input.login-ctrl:focus {
      outline: none;
      border-color: #0066ff;
      box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.12);
    }
    #loginForm .password-row {
      position: relative;
    }
    #loginForm .password-row input.login-ctrl {
      padding-right: 3.5rem;
    }
    .password-toggle {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      color: #64748b;
      cursor: pointer;
      font-size: 0.8125rem;
      font-weight: 600;
      padding: 0.25rem 0.5rem;
      line-height: 1;
      border-radius: 6px;
    }
    .password-toggle:hover { color: #0066ff; }
    .password-toggle:focus-visible {
      outline: 2px solid #0066ff;
      outline-offset: 2px;
    }

    /* Autofill: force white (Chrome/Edge UA grey/yellow — needs !important + delay trick) */
    @keyframes login-autofill-bg {
      to {
        background: #ffffff;
        background-color: #ffffff;
        background-image: none;
      }
    }
    #loginForm input.login-ctrl:-webkit-autofill,
    #loginForm input.login-ctrl:-webkit-autofill:hover,
    #loginForm input.login-ctrl:-webkit-autofill:focus,
    #loginForm input.login-ctrl:-webkit-autofill:active {
      -webkit-text-fill-color: #0f172a !important;
      caret-color: #0f172a;
      border: 1px solid #cbd5e1 !important;
      background-color: #ffffff !important;
      background-image: none !important;
      -webkit-box-shadow: 0 0 0 1000px #ffffff inset !important;
      box-shadow: 0 0 0 1000px #ffffff inset !important;
      transition: background-color 99999s ease-out 0s !important;
      animation-name: login-autofill-bg;
      animation-duration: 0.001s;
      animation-fill-mode: both;
    }
    #loginForm input.login-ctrl:-webkit-autofill:focus {
      border-color: #0066ff !important;
      box-shadow:
        0 0 0 4px rgba(0, 102, 255, 0.12),
        0 0 0 1000px #ffffff inset !important;
      -webkit-box-shadow:
        0 0 0 4px rgba(0, 102, 255, 0.12),
        0 0 0 1000px #ffffff inset !important;
    }
    #loginForm input.login-ctrl:-internal-autofill-selected {
      -webkit-text-fill-color: #0f172a !important;
      -webkit-box-shadow: 0 0 0 1000px #ffffff inset !important;
      box-shadow: 0 0 0 1000px #ffffff inset !important;
      background-color: #ffffff !important;
      background-image: none !important;
    }
    #loginForm input.login-ctrl:autofill,
    #loginForm input.login-ctrl:autofill:hover,
    #loginForm input.login-ctrl:autofill:focus {
      -webkit-text-fill-color: #0f172a !important;
      caret-color: #0f172a;
      border: 1px solid #cbd5e1 !important;
      background-color: #ffffff !important;
      background-image: none !important;
      box-shadow: 0 0 0 1000px #ffffff inset !important;
      transition: background-color 99999s ease-out 0s !important;
    }
    #loginForm input.login-ctrl:autofill:focus {
      border-color: #0066ff !important;
      box-shadow:
        0 0 0 4px rgba(0, 102, 255, 0.12),
        0 0 0 1000px #ffffff inset !important;
    }

    /* Field error */
    .form-panel .field-error { color: #dc2626; font-size: 0.775rem; }
    #loginForm input.login-ctrl.error {
      border-color: #dc2626;
      box-shadow: none;
    }
    #loginForm input.login-ctrl.error:-webkit-autofill,
    #loginForm input.login-ctrl.error:-webkit-autofill:focus {
      border-color: #dc2626 !important;
      box-shadow: 0 0 0 1000px #ffffff inset !important;
      -webkit-box-shadow: 0 0 0 1000px #ffffff inset !important;
    }

    /* Submit */
    .btn-login {
      width: 100%;
      height: 48px;
      background: #0066ff;
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.25rem;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 8px 20px rgba(0, 102, 255, 0.25);
    }
    .btn-login:hover:not(:disabled) {
      background: #0052cc;
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0, 102, 255, 0.3);
    }
    .btn-login:disabled { opacity: 0.55; cursor: not-allowed; }

    /* Spinner inside primary button */
    .btn-login .spinner {
      width: 17px; height: 17px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
    }

    /* Back to home — high visibility, easy tap */
    .back-home {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      min-height: 48px;
      padding: 0.65rem 1rem;
      margin-bottom: 1.5rem;
      box-sizing: border-box;
      color: #0066ff;
      font-size: 0.9375rem;
      font-weight: 600;
      text-decoration: none;
      border: 1.5px solid rgba(0, 102, 255, 0.35);
      border-radius: 999px;
      background: #ffffff;
      box-shadow: 0 1px 2px rgba(7, 26, 61, 0.06);
      transition: background 0.15s, border-color 0.15s, color 0.15s, box-shadow 0.15s;
    }
    .back-home:hover {
      color: #0052cc;
      border-color: #0066ff;
      background: #f2f8ff;
      box-shadow: 0 4px 14px rgba(0, 102, 255, 0.15);
      text-decoration: none;
    }
    .back-home:focus-visible {
      outline: 3px solid rgba(0, 102, 255, 0.35);
      outline-offset: 2px;
    }
    .back-home svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      stroke-width: 2.25;
    }

    /* Sign-up footer text */
    .signup-text {
      text-align: center;
      margin-top: 1.75rem;
      font-size: 0.85rem;
      color: #64748b;
    }
    .signup-text a { color: #0066ff; font-weight: 600; text-decoration: none; }
    .signup-text a:hover { color: #0052cc; text-decoration: underline; }

    /* Alert */
    .form-panel .alert-danger {
      background: #fee2e2;
      color: #7f1d1d;
      border-color: #fca5a5;
      margin-bottom: 1rem;
    }

    .form-logo {
      text-align: center;
      margin-bottom: 1.35rem;
    }
    .form-logo img {
      height: 48px;
      width: auto;
      max-width: 200px;
      object-fit: contain;
      margin: 0 auto;
      display: block;
    }

    /* Responsive */
    @media (max-width: 767px) {
      .auth-page {
        padding: 0;
        align-items: flex-start;
        min-height: 100vh;
      }
      .login-wrap {
        grid-template-columns: 1fr;
        grid-template-rows: 220px auto;
        height: auto;
        max-width: 100%;
        border-radius: 0;
        border: none;
        box-shadow: none;
      }
      /* Show image as compact strip on mobile */
      .slider-panel {
        display: block;
        height: 220px;
      }
      .form-panel {
        padding: 2rem 1.75rem 2.5rem;
        border-radius: 0;
        min-height: calc(100vh - 220px);
        background: #ffffff !important;
        background-color: #ffffff !important;
      }
      .form-logo img { height: 56px; }
      .back-home {
        margin-bottom: 1.25rem;
        min-height: 52px;
        font-size: 1rem;
      }
    }
    @media (max-width: 480px) {
      .slider-panel { height: 180px; }
      .form-panel {
        padding: 1.75rem 1.25rem 2rem;
        min-height: calc(100vh - 180px);
      }
      .form-logo img { height: 52px; }
    }
  </style>
</head>
<body>

<div class="auth-page">
  <div class="login-wrap">

    <!-- Left: Image Slider -->
    <div class="slider-panel" id="sliderPanel">
      <div class="slider-dots" id="sliderDots"></div>
    </div>

    <!-- Right: Login Form -->
    <div class="form-panel">
      <div class="form-inner">

        <a href="/" class="back-home" aria-label="Return to ImpactCircle home page">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
          <span>Back to Home</span>
        </a>

        <div class="form-logo">
          <img src="/images/logo.png" alt="ImpactCircle" height="52" width="180" decoding="async">
        </div>

        <h1>Welcome Back</h1>
        <p class="subtitle">Enter your credentials to access your account.</p>

        <!-- Alert area -->
        <div id="alertArea"></div>

        <form id="loginForm" novalidate>

          <!-- Email: autocomplete=username is the standard sign-in hint (reduces odd UA tint vs autocomplete=email) -->
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" class="login-ctrl" id="email" name="username" placeholder="m@example.com" autocomplete="username" inputmode="email" required>
            <span class="field-error"></span>
          </div>

          <!-- Password -->
          <div class="form-group">
            <div class="label-row">
              <label for="password">Password</label>
              <a href="/forgot-password" class="forgot-link">Forgot password?</a>
            </div>
            <div class="password-row">
              <input type="password" class="login-ctrl" id="password" name="password" autocomplete="current-password" required>
              <button type="button" class="password-toggle" id="passwordToggle" aria-label="Show password">Show</button>
            </div>
            <span class="field-error"></span>
          </div>

          <button type="submit" class="btn-login" id="submitBtn">Log In</button>
        </form>

        <p class="signup-text">
          Don't have an account? <a href="/register-volunteer">Sign up</a>
        </p>

      </div>
    </div>

  </div>
</div>

<script src="/js/api.js"></script>
<script>
  // Already logged in → redirect immediately
  if (API.isLoggedIn()) API.redirectByRole(API.getUser());

  // ─── Image Slider ───────────────────────────────────────────
  const SLIDES = [
    'https://images.unsplash.com/photo-1559027615-cd4628902d4a?w=1200&auto=format&fit=crop&q=85',
    'https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?w=1200&auto=format&fit=crop&q=85',
    'https://images.unsplash.com/photo-1528605248644-14dd04022da1?w=1200&auto=format&fit=crop&q=85',
    'https://images.unsplash.com/photo-1582213782179-e0d53f98f2ca?w=1200&auto=format&fit=crop&q=85',
  ];

  let current = 0;
  const panel  = document.getElementById('sliderPanel');
  const dotsEl = document.getElementById('sliderDots');

  const imgs = SLIDES.map((src, i) => {
    const img = document.createElement('img');
    img.src = src;
    img.alt = `Volunteer photo ${i + 1}`;
    img.className = 'slider-img' + (i === 0 ? ' active' : '');
    img.loading = i === 0 ? 'eager' : 'lazy';
    panel.insertBefore(img, dotsEl);
    return img;
  });

  const dots = SLIDES.map((_, i) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'slider-dot' + (i === 0 ? ' active' : '');
    btn.setAttribute('aria-label', `Go to slide ${i + 1}`);
    btn.addEventListener('click', () => goTo(i));
    dotsEl.appendChild(btn);
    return btn;
  });

  function goTo(index) {
    imgs[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = index;
    imgs[current].classList.add('active');
    dots[current].classList.add('active');
  }

  setInterval(() => goTo((current + 1) % SLIDES.length), 4000);

  // ─── Form ───────────────────────────────────────────────────
  ['email', 'password'].forEach(id => {
    document.getElementById(id).addEventListener('input', function () {
      Validator.clearError(this);
    });
  });

  const passwordEl = document.getElementById('password');
  const passwordToggleEl = document.getElementById('passwordToggle');

  passwordToggleEl.addEventListener('click', () => {
    const isHidden = passwordEl.type === 'password';
    passwordEl.type = isHidden ? 'text' : 'password';
    passwordToggleEl.textContent = isHidden ? 'Hide' : 'Show';
    passwordToggleEl.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
  });

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    document.getElementById('alertArea').innerHTML = '';

    const emailEl = document.getElementById('email');
    const pwdEl   = document.getElementById('password');
    const email   = emailEl.value.trim();
    const password = pwdEl.value;

    let valid = true;
    if (!Validator.email(email)) {
      Validator.showError(emailEl, 'Please enter a valid email address.');
      valid = false;
    }
    if (!password) {
      Validator.showError(pwdEl, 'Password is required.');
      valid = false;
    }
    if (!valid) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Signing in...';

    try {
      const { data } = await API.post('/auth/login', { email, password });
      API.setSession(data.token, data.user);
      Toast.success('Welcome back!');
      setTimeout(() => API.redirectByRole(data.user), 800);
    } catch (err) {
      document.getElementById('alertArea').innerHTML =
        `<div class="alert alert-danger">${err.message || 'Login failed. Please try again.'}</div>`;
      btn.disabled = false;
      btn.textContent = 'Log In';
    }
  });
</script>
<script src="/js/footer.js"></script>
</body>
</html>
