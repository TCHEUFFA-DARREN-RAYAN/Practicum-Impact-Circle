<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | ImpactCircle</title>
  <link rel="stylesheet" href="/css/base.css">
  <style>
    body { background: #f1f5f9; }

    .auth-page {
      background: #f1f5f9;
      padding: 1.5rem;
      align-items: center;
    }

    /* ── Split container ── */
    .login-wrap {
      width: 100%;
      max-width: 960px;
      height: 650px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(15,23,42,0.12), 0 4px 16px rgba(15,23,42,0.06);
      border: 1px solid #e2e8f0;
    }

    /* ── Image Slider ── */
    .slider-panel {
      position: relative;
      overflow: hidden;
      background: #dbeafe;
    }
    .slider-img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1s ease-in-out;
      will-change: opacity;
    }
    .slider-img.active { opacity: 1; }
    .slider-dots {
      position: absolute;
      bottom: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.5rem;
      z-index: 10;
    }
    .slider-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      border: none; cursor: pointer; padding: 0;
      transition: background 0.3s;
    }
    .slider-dot.active { background: #fff; }
    .slider-dot:hover:not(.active) { background: rgba(255,255,255,0.8); }

    /* ── Form panel ── */
    .form-panel {
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2.75rem;
      overflow-y: auto;
    }
    .form-inner { width: 100%; max-width: 320px; }

    /* Typography */
    .form-panel h1 {
      color: #0f172a;
      font-size: 1.875rem;
      font-weight: 700;
      margin-bottom: 0.375rem;
      line-height: 1.2;
    }
    .form-panel .subtitle {
      color: #64748b;
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }

    /* Social buttons */
    .social-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .btn-social {
      height: 40px;
      background: #fff;
      border: 1px solid #e2e8f0;
      color: #374151;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      text-decoration: none;
    }
    .btn-social:hover {
      background: #f8fafc;
      border-color: #cbd5e1;
      color: #0f172a;
      text-decoration: none;
    }
    .btn-social svg { width: 15px; height: 15px; flex-shrink: 0; }

    /* OR divider */
    .or-divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      font-size: 0.7rem;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1; height: 1px; background: #e2e8f0;
    }

    /* Labels */
    .form-panel label {
      color: #0f172a;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.375rem;
    }
    .label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.375rem;
    }
    .label-row label { margin-bottom: 0; }
    .forgot-link {
      font-size: 0.8125rem;
      font-weight: 500;
      color: #64748b;
      text-decoration: none;
      transition: color 0.15s;
    }
    .forgot-link:hover { color: #1e40af; text-decoration: none; }

    /* Inputs — light */
    .form-panel input[type="email"],
    .form-panel input[type="password"],
    .form-panel input[type="text"] {
      background: #fff;
      border-color: #cbd5e1;
      color: #0f172a;
      border-radius: 8px;
    }
    .password-field { position: relative; }
    .password-field input { padding-right: 2.75rem; }
    .password-toggle {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      font-size: 0.8125rem;
      font-weight: 600;
      padding: 0;
      line-height: 1;
    }
    .password-toggle:hover { color: #475569; }
    .password-toggle:focus-visible {
      outline: 2px solid #1e40af;
      outline-offset: 2px;
      border-radius: 4px;
    }
    .form-panel input::placeholder { color: #94a3b8; }
    .form-panel input:-webkit-autofill,
    .form-panel input:-webkit-autofill:hover,
    .form-panel input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px #fff inset;
      -webkit-text-fill-color: #0f172a;
      caret-color: #0f172a;
    }
    .form-panel input:focus {
      border-color: #1e40af;
      box-shadow: 0 0 0 3px rgba(30,64,175,0.1);
    }
    .form-panel input.error { border-color: #dc2626; }

    /* Field error */
    .form-panel .field-error { color: #dc2626; font-size: 0.775rem; }

    /* Submit */
    .btn-login {
      width: 100%;
      height: 44px;
      background: #1e40af;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.25rem;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .btn-login:hover:not(:disabled) { background: #1e3a8a; }
    .btn-login:disabled { opacity: 0.55; cursor: not-allowed; }

    /* Spinner inside primary button */
    .btn-login .spinner {
      width: 17px; height: 17px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
    }

    /* Back to home */
    .back-home {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      color: #64748b;
      font-size: 0.8125rem;
      font-weight: 500;
      text-decoration: none;
      margin-bottom: 1.75rem;
      transition: color 0.15s;
    }
    .back-home:hover { color: #0f172a; text-decoration: none; }
    .back-home svg { width: 14px; height: 14px; }

    /* Sign-up footer text */
    .signup-text {
      text-align: center;
      margin-top: 1.75rem;
      font-size: 0.85rem;
      color: #64748b;
    }
    .signup-text a { color: #1e40af; font-weight: 600; text-decoration: none; }
    .signup-text a:hover { color: #1e3a8a; text-decoration: underline; }

    /* Alert */
    .form-panel .alert-danger {
      background: #fee2e2;
      color: #7f1d1d;
      border-color: #fca5a5;
      margin-bottom: 1rem;
    }

    /* Logo shown only on mobile */
    .mobile-logo {
      display: none;
      text-align: center;
      margin-bottom: 1.25rem;
    }
    .mobile-logo img {
      height: 72px;
      width: auto;
      margin: 0 auto;
    }

    /* Responsive */
    @media (max-width: 767px) {
      .auth-page {
        padding: 0;
        align-items: flex-start;
        min-height: 100vh;
      }
      .login-wrap {
        grid-template-columns: 1fr;
        grid-template-rows: 220px auto;
        height: auto;
        max-width: 100%;
        border-radius: 0;
        border: none;
        box-shadow: none;
      }
      /* Show image as compact strip on mobile */
      .slider-panel {
        display: block;
        height: 220px;
      }
      .form-panel {
        padding: 2rem 1.75rem 2.5rem;
        border-radius: 0;
        min-height: calc(100vh - 220px);
      }
      .mobile-logo { display: block; }
      .back-home {
        display: inline-flex;
        margin-bottom: 1.5rem;
      }
    }
    @media (max-width: 480px) {
      .slider-panel { height: 180px; }
      .form-panel {
        padding: 1.75rem 1.25rem 2rem;
        min-height: calc(100vh - 180px);
      }
      .mobile-logo img { height: 60px; }
    }
  </style>
</head>
<body>

<div class="auth-page">
  <div class="login-wrap">

    <!-- Left: Image Slider -->
    <div class="slider-panel" id="sliderPanel">
      <div class="slider-dots" id="sliderDots"></div>
    </div>

    <!-- Right: Login Form -->
    <div class="form-panel">
      <div class="form-inner">

        <div class="mobile-logo">
          <img src="/images/logo.png" alt="Impact Circle">
        </div>

        <a href="/" class="back-home">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Back to Home
        </a>

        <h1>Welcome Back</h1>
        <p class="subtitle">Enter your credentials to access your account.</p>

        <!-- Social buttons (UI placeholder — OAuth not yet wired) -->
        <div class="social-btns">
          <button type="button" class="btn-social" id="btnGoogle">
            <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M12.479 14.265v-3.279h11.049c.108.571.164 1.247.164 1.979 0 2.46-.672 5.502-2.84 7.669C18.744 22.829 16.051 24 12.483 24 5.869 24 .308 18.613.308 12S5.869 0 12.483 0c3.659 0 6.265 1.436 8.223 3.307L18.392 5.62c-1.404-1.317-3.307-2.341-5.913-2.341C7.65 3.279 3.873 7.171 3.873 12s3.777 8.721 8.606 8.721c3.132 0 4.916-1.258 6.059-2.401.927-.927 1.537-2.251 1.777-4.059l-7.836.004z"/>
            </svg>
            Google
          </button>
          <button type="button" class="btn-social" id="btnApple">
            <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.54 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701"/>
            </svg>
            Apple
          </button>
        </div>

        <!-- OR divider -->
        <div class="or-divider">Or continue with</div>

        <!-- Alert area -->
        <div id="alertArea"></div>

        <form id="loginForm" novalidate>

          <!-- Email -->
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="m@example.com" autocomplete="email" required>
            <span class="field-error"></span>
          </div>

          <!-- Password -->
          <div class="form-group">
            <div class="label-row">
              <label for="password">Password</label>
              <a href="#" class="forgot-link">Forgot password?</a>
            </div>
            <div class="password-field">
              <input type="password" id="password" autocomplete="current-password" required>
              <button type="button" class="password-toggle" id="passwordToggle" aria-label="Show password">Show</button>
            </div>
            <span class="field-error"></span>
          </div>

          <button type="submit" class="btn-login" id="submitBtn">Log In</button>
        </form>

        <p class="signup-text">
          Don't have an account? <a href="/register-volunteer">Sign up</a>
        </p>

      </div>
    </div>

  </div>
</div>

<script src="/js/api.js"></script>
<script>
  // Already logged in → redirect immediately
  if (API.isLoggedIn()) API.redirectByRole(API.getUser());

  // ─── Image Slider ───────────────────────────────────────────
  const SLIDES = [
    'https://images.unsplash.com/photo-1559027615-cd4628902d4a?w=800&auto=format&fit=crop&q=80',
    'https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?w=800&auto=format&fit=crop&q=80',
    'https://images.unsplash.com/photo-1593113598332-cd288d649433?w=800&auto=format&fit=crop&q=80',
    'https://images.unsplash.com/photo-1582213782179-e0d53f98f2ca?w=800&auto=format&fit=crop&q=80',
  ];

  let current = 0;
  const panel  = document.getElementById('sliderPanel');
  const dotsEl = document.getElementById('sliderDots');

  const imgs = SLIDES.map((src, i) => {
    const img = document.createElement('img');
    img.src = src;
    img.alt = `Volunteer photo ${i + 1}`;
    img.className = 'slider-img' + (i === 0 ? ' active' : '');
    img.loading = i === 0 ? 'eager' : 'lazy';
    panel.insertBefore(img, dotsEl);
    return img;
  });

  const dots = SLIDES.map((_, i) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'slider-dot' + (i === 0 ? ' active' : '');
    btn.setAttribute('aria-label', `Go to slide ${i + 1}`);
    btn.addEventListener('click', () => goTo(i));
    dotsEl.appendChild(btn);
    return btn;
  });

  function goTo(index) {
    imgs[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = index;
    imgs[current].classList.add('active');
    dots[current].classList.add('active');
  }

  setInterval(() => goTo((current + 1) % SLIDES.length), 4000);

  // ─── Social button placeholders ─────────────────────────────
  document.getElementById('btnGoogle').addEventListener('click', () =>
    Toast.info('Google sign-in coming soon.')
  );
  document.getElementById('btnApple').addEventListener('click', () =>
    Toast.info('Apple sign-in coming soon.')
  );

  // ─── Form ───────────────────────────────────────────────────
  ['email', 'password'].forEach(id => {
    document.getElementById(id).addEventListener('input', function () {
      Validator.clearError(this);
    });
  });

  const passwordEl = document.getElementById('password');
  const passwordToggleEl = document.getElementById('passwordToggle');

  passwordToggleEl.addEventListener('click', () => {
    const isHidden = passwordEl.type === 'password';
    passwordEl.type = isHidden ? 'text' : 'password';
    passwordToggleEl.textContent = isHidden ? 'Hide' : 'Show';
    passwordToggleEl.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
  });

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    document.getElementById('alertArea').innerHTML = '';

    const emailEl = document.getElementById('email');
    const pwdEl   = document.getElementById('password');
    const email   = emailEl.value.trim();
    const password = pwdEl.value;

    let valid = true;
    if (!Validator.email(email)) {
      Validator.showError(emailEl, 'Please enter a valid email address.');
      valid = false;
    }
    if (!password) {
      Validator.showError(pwdEl, 'Password is required.');
      valid = false;
    }
    if (!valid) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Signing in...';

    try {
      const { data } = await API.post('/auth/login', { email, password });
      API.setSession(data.token, data.user);
      Toast.success('Welcome back!');
      setTimeout(() => API.redirectByRole(data.user), 800);
    } catch (err) {
      document.getElementById('alertArea').innerHTML =
        `<div class="alert alert-danger">${err.message || 'Login failed. Please try again.'}</div>`;
      btn.disabled = false;
      btn.textContent = 'Log In';
    }
  });
</script>
<script src="/js/footer.js"></script></body>
</html>
