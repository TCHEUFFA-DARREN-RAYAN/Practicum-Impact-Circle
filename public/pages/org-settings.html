<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Settings | Organization | ImpactCircle</title>
  <link rel="stylesheet" href="/css/base.css">
  <style>
    .settings-layout { display:grid; grid-template-columns:220px 1fr; gap:1.5rem; align-items:start; }
    @media(max-width:720px){ .settings-layout{ grid-template-columns:1fr; } }
    .settings-tabs { display:flex; flex-direction:column; gap:0.25rem; }
    .stab { display:flex; align-items:center; gap:0.625rem; padding:0.625rem 0.875rem; border-radius:8px; font-size:0.875rem; font-weight:500; cursor:pointer; color:var(--text-muted); border:none; background:none; width:100%; text-align:left; transition:background 0.15s,color 0.15s; }
    .stab:hover { background:var(--bg-subtle,#f1f5f9); color:var(--text); }
    .stab.active { background:var(--primary); color:#fff; }
    .stab svg { width:16px; height:16px; flex-shrink:0; }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }
    .section-title { font-size:1.05rem; font-weight:700; margin-bottom:1.25rem; color:var(--text); }
    .logo-circle { width:80px; height:80px; border-radius:50%; background:var(--primary); display:flex; align-items:center; justify-content:center; font-size:2rem; font-weight:700; color:#fff; overflow:hidden; flex-shrink:0; }
    .logo-circle img { width:100%; height:100%; object-fit:cover; }
    .save-bar { display:flex; justify-content:flex-end; gap:0.75rem; margin-top:1.25rem; padding-top:1rem; border-top:1px solid var(--border); }
  </style>
</head>
<body>
<nav id="navbar"></nav>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<aside id="sidebar" class="sidebar"></aside>
<div class="page-content">
  <div class="container">
    <div class="page-header"><div class="page-header-row"><div><h1>Settings</h1><p class="text-muted">Manage your organization account</p></div></div></div>

    <div class="settings-layout">
      <div class="card" style="padding:0.75rem">
        <div class="settings-tabs">
          <button class="stab active" data-tab="account" onclick="switchTab('account')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/></svg>Account
          </button>
          <button class="stab" data-tab="orginfo" onclick="switchTab('orginfo')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>Organization Info
          </button>
        </div>
      </div>

      <div>
        <!-- Account -->
        <div class="tab-panel active" id="panel-account">
          <div class="card" style="padding:1.5rem;margin-bottom:1rem">
            <div class="section-title">Organization Logo</div>
            <div style="display:flex;align-items:center;gap:1.25rem;margin-bottom:1.5rem">
              <div class="logo-circle" id="logoPreview"></div>
              <div>
                <label class="btn btn-secondary" style="cursor:pointer;display:inline-block;margin-bottom:0.5rem">
                  Upload Logo
                  <input type="file" id="logoFile" accept="image/*" style="display:none" onchange="previewLogo(this)">
                </label>
                <p class="text-muted" style="font-size:0.8rem;margin:0">JPG, PNG, GIF or WEBP · Max 3MB</p>
                <button class="btn btn-sm btn-primary" style="margin-top:0.5rem" onclick="uploadLogo()">Save Logo</button>
              </div>
            </div>
          </div>
          <div class="card" style="padding:1.5rem;margin-bottom:1rem">
            <div class="section-title">Change Email</div>
            <div id="emailAlert"></div>
            <div class="form-group"><label>New Email Address</label><input type="email" id="newEmail"></div>
            <div class="form-group"><label>Confirm with Password</label><input type="password" id="emailPassword"></div>
            <div class="save-bar" style="border:none;padding:0;margin-top:0.75rem"><button class="btn btn-primary" onclick="updateEmail()">Update Email</button></div>
          </div>
          <div class="card" style="padding:1.5rem">
            <div class="section-title">Change Password</div>
            <div id="passwordAlert"></div>
            <div class="form-group"><label>Current Password</label><input type="password" id="currentPwd"></div>
            <div class="form-group"><label>New Password</label><input type="password" id="newPwd" placeholder="Min 8 chars, uppercase & number"></div>
            <div class="form-group"><label>Confirm New Password</label><input type="password" id="confirmPwd"></div>
            <div class="save-bar" style="border:none;padding:0;margin-top:0.75rem"><button class="btn btn-primary" onclick="changePassword()">Update Password</button></div>
          </div>
        </div>

        <!-- Org Info -->
        <div class="tab-panel" id="panel-orginfo">
          <div class="card" style="padding:1.5rem">
            <div class="section-title">Organization Details</div>
            <div id="orgAlert"></div>
            <div class="form-row">
              <div class="form-group"><label>Organization Name <span style="color:#dc2626">*</span></label><input type="text" id="oName"><span class="field-error" id="nameErr"></span></div>
              <div class="form-group"><label>Address</label><input type="text" id="oAddress"></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Contact Name</label><input type="text" id="oContactName"></div>
              <div class="form-group"><label>Contact Email</label><input type="email" id="oContactEmail"></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Contact Phone</label><input type="tel" id="oPhone"></div>
              <div class="form-group"><label>Website</label><input type="url" id="oWebsite" placeholder="https://"></div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Province</label>
                <select id="oProvince">
                  <option value="">Select province…</option>
                  <option>Alberta</option><option>British Columbia</option><option>Manitoba</option>
                  <option>New Brunswick</option><option>Newfoundland and Labrador</option>
                  <option>Northwest Territories</option><option>Nova Scotia</option><option>Nunavut</option>
                  <option>Ontario</option><option>Prince Edward Island</option><option>Quebec</option>
                  <option>Saskatchewan</option><option>Yukon</option>
                </select>
              </div>
              <div class="form-group"><label>City</label><input type="text" id="oCity" placeholder="e.g. Moncton"></div>
            </div>
            <div class="form-group"><label>Mission Statement</label><textarea id="oMission" rows="4" placeholder="Describe your organization's mission..."></textarea></div>
            <div class="save-bar">
              <button class="btn btn-secondary" onclick="loadOrgInfo()">Reset</button>
              <button class="btn btn-primary" onclick="saveOrgInfo()">Save Changes</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/footer.js"></script>
<script>
API.requireAuth('org');
let myUserId = null;

function switchTab(t) {
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
  document.querySelector(`.stab[data-tab="${t}"]`).classList.add('active');
}

async function loadOrgInfo() {
  try {
    const [meRes, orgRes] = await Promise.all([API.get('/auth/me'), API.get('/orgs/me')]);
    const user = meRes.data.user;
    const org = orgRes.data.org;
    myUserId = user && user.id;
    const el = document.getElementById('logoPreview');
    if (org && org.logoUrl && myUserId) {
      el.innerHTML = `<img src="/api/uploads/${myUserId}/${org.logoUrl}" alt="Logo">`;
    } else {
      el.textContent = ((org && org.orgName) || (user && user.email) || '?')[0].toUpperCase();
    }
    document.getElementById('newEmail').placeholder = (user && user.email) || '';
    document.getElementById('oName').value = (org && org.orgName) || '';
    document.getElementById('oAddress').value = (org && org.address) || '';
    document.getElementById('oContactName').value = (org && org.contactName) || '';
    document.getElementById('oContactEmail').value = (org && org.contactEmail) || '';
    document.getElementById('oPhone').value = (org && org.contactPhone) || '';
    document.getElementById('oWebsite').value = (org && org.website) || '';
    document.getElementById('oMission').value = (org && org.missionStatement) || '';
    document.getElementById('oProvince').value = (org && org.province) || '';
    document.getElementById('oCity').value = (org && org.city) || '';
  } catch(e) { Toast.error('Failed to load: '+e.message); }
}

function previewLogo(input) {
  if (!input.files[0]) return;
  const r = new FileReader(); r.onload = e => { document.getElementById('logoPreview').innerHTML=`<img src="${e.target.result}">`; }; r.readAsDataURL(input.files[0]);
}

async function uploadLogo() {
  const file = document.getElementById('logoFile').files[0];
  if (!file) return Toast.error('Please choose an image first.');
  const form = new FormData(); form.append('logo', file);
  try { await API.upload('/orgs/me/logo', form); Toast.success('Logo updated!'); }
  catch(e) { Toast.error(e.message); }
}

async function updateEmail() {
  const email = document.getElementById('newEmail').value.trim();
  const pwd   = document.getElementById('emailPassword').value;
  const alertEl = document.getElementById('emailAlert');
  alertEl.innerHTML = '';
  if (!email) return alertEl.innerHTML = '<div class="alert alert-danger">Email address is required.</div>';
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return alertEl.innerHTML = '<div class="alert alert-danger">Please enter a valid email address.</div>';
  if (!pwd) return alertEl.innerHTML = '<div class="alert alert-danger">Current password is required to change email.</div>';
  try {
    const res = await API.put('/auth/update-email', { email, password: pwd });
    if (res.data && res.data.token) API.setSession(res.data.token, res.data.user || API.getUser());
    alertEl.innerHTML = '<div class="alert alert-success">Email updated successfully.</div>';
    document.getElementById('newEmail').value=''; document.getElementById('emailPassword').value='';
  } catch(e) { alertEl.innerHTML=`<div class="alert alert-danger">${e.message}</div>`; }
}

async function changePassword() {
  const cur = document.getElementById('currentPwd').value;
  const nw  = document.getElementById('newPwd').value;
  const cf  = document.getElementById('confirmPwd').value;
  const alertEl = document.getElementById('passwordAlert');
  alertEl.innerHTML = '';
  if (!cur) return alertEl.innerHTML = '<div class="alert alert-danger">Current password is required.</div>';
  if (!nw)  return alertEl.innerHTML = '<div class="alert alert-danger">New password is required.</div>';
  if (nw.length < 8) return alertEl.innerHTML = '<div class="alert alert-danger">Password must be at least 8 characters.</div>';
  if (!/[A-Z]/.test(nw)) return alertEl.innerHTML = '<div class="alert alert-danger">Password must contain at least one uppercase letter.</div>';
  if (!/[0-9]/.test(nw)) return alertEl.innerHTML = '<div class="alert alert-danger">Password must contain at least one number.</div>';
  if (nw !== cf) return alertEl.innerHTML = '<div class="alert alert-danger">Passwords do not match.</div>';
  try {
    await API.post('/auth/change-password', { currentPassword:cur, newPassword:nw });
    alertEl.innerHTML = '<div class="alert alert-success">Password updated successfully.</div>';
    document.getElementById('currentPwd').value=''; document.getElementById('newPwd').value=''; document.getElementById('confirmPwd').value='';
  } catch(e) { alertEl.innerHTML=`<div class="alert alert-danger">${e.message}</div>`; }
}

async function saveOrgInfo() {
  const alertEl = document.getElementById('orgAlert');
  alertEl.innerHTML = '';
  document.getElementById('nameErr').textContent = '';
  const orgName      = document.getElementById('oName').value.trim();
  const contactEmail = document.getElementById('oContactEmail').value.trim();
  const phone        = document.getElementById('oPhone').value.trim();
  const website      = document.getElementById('oWebsite').value.trim();

  if (!orgName) { document.getElementById('nameErr').textContent = 'Organization name is required.'; return; }
  if (contactEmail && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(contactEmail))
    return alertEl.innerHTML = '<div class="alert alert-danger">Contact email is not a valid email address.</div>';
  if (phone && (phone.replace(/\D/g,'').length < 7 || phone.replace(/\D/g,'').length > 15))
    return alertEl.innerHTML = '<div class="alert alert-danger">Phone number must be 7–15 digits.</div>';
  if (website && !/^https?:\/\/.+/.test(website))
    return alertEl.innerHTML = '<div class="alert alert-danger">Website must start with http:// or https://</div>';

  try {
    await API.put('/orgs/me', {
      orgName,
      address: document.getElementById('oAddress').value.trim(),
      contactName: document.getElementById('oContactName').value.trim(),
      contactEmail,
      contactPhone: phone,
      website,
      missionStatement: document.getElementById('oMission').value.trim(),
      province: document.getElementById('oProvince').value || undefined,
      city: document.getElementById('oCity').value.trim() || undefined,
    });
    document.getElementById('orgAlert').innerHTML='<div class="alert alert-success">Organization info saved.</div>';
  } catch(e) { document.getElementById('orgAlert').innerHTML=`<div class="alert alert-danger">${e.message}</div>`; }
}

loadOrgInfo();
</script>
</body>
</html>
