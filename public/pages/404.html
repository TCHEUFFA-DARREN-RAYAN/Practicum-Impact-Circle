<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | ImpactCircle</title>
  <link rel="stylesheet" href="/css/base.css">
  <style>
    body { background: #0f0f0f; }
    .not-found-page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; text-align: center; padding: 2rem;
    }
    .not-found-code { font-size: 7rem; font-weight: 900; color: #222; line-height: 1; margin-bottom: 0.5rem; }
    .not-found-title { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 0.75rem; }
    .not-found-sub { color: #666; font-size: 0.9375rem; margin-bottom: 2rem; max-width: 360px; line-height: 1.65; }
    .not-found-btns { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .btn-nf-primary {
      background: #5b5ef4; color: white; padding: 0.6875rem 1.5rem;
      border-radius: 8px; font-weight: 600; font-size: 0.9rem;
      text-decoration: none; transition: background 0.15s;
    }
    .btn-nf-primary:hover { background: #4649d4; color: white; text-decoration: none; }
    .btn-nf-outline {
      background: transparent; color: #888; padding: 0.6875rem 1.5rem;
      border-radius: 8px; font-weight: 600; font-size: 0.9rem;
      border: 1px solid #333; text-decoration: none; transition: all 0.15s;
    }
    .btn-nf-outline:hover { color: #ccc; border-color: #555; text-decoration: none; }
  </style>
</head>
<body>
  <div class="not-found-page">
    <div class="not-found-code">404</div>
    <h1 class="not-found-title">Page not found</h1>
    <p class="not-found-sub">The page you're looking for doesn't exist or may have been moved.</p>
    <div class="not-found-btns">
      <a href="/" class="btn-nf-primary">Back to Home</a>
      <a href="/gigs" class="btn-nf-outline">Browse Gigs</a>
    </div>
  </div>
<script src="/js/footer.js"></script></body>
</html>
