<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | ImpactCircle</title>
  <link rel="stylesheet" href="/css/base.css">
  <style>
    .nf-wrap {
      min-height: calc(100vh - var(--nav-height) - 120px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem 4rem;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(14, 165, 233, 0.12), transparent 55%),
        linear-gradient(180deg, #f8fafc 0%, #ffffff 45%);
    }
    .nf-card {
      max-width: 520px;
      text-align: center;
      background: #fff;
      border: 1px solid rgba(14, 165, 233, 0.18);
      border-radius: 20px;
      padding: 3rem 2.25rem 2.75rem;
      box-shadow: 0 4px 24px rgba(15, 23, 42, 0.06), 0 1px 0 rgba(255, 255, 255, 1) inset;
    }
    .nf-code {
      font-size: clamp(4.5rem, 14vw, 6.5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #0284c7 0%, #0ea5e9 50%, #38bdf8 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.35rem;
    }
    .nf-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }
    .nf-sub {
      color: #64748b;
      font-size: 1rem;
      line-height: 1.65;
      margin-bottom: 2rem;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }
    .nf-btns {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <nav id="navbar"></nav>

  <main class="nf-wrap page-content">
    <div class="nf-card">
      <div class="nf-code" aria-hidden="true">404</div>
      <h1 class="nf-title">Page not found</h1>
      <p class="nf-sub">
        The page you are looking for does not exist or may have been moved.
        Try the home page or browse open volunteer gigs.
      </p>
      <div class="nf-btns">
        <a href="/" class="btn btn-primary">Back to Home</a>
        <a href="/upcoming-shifts" class="btn btn-secondary">Browse gigs</a>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/footer.js"></script>
</body>
</html>
