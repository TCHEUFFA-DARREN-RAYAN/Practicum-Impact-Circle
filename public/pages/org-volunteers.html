<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volunteer Tracker | ImpactCircle</title>
  <link rel="stylesheet" href="/css/base.css">
  <style>
    .filter-tabs { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1.5rem; }
    .filter-tab {
      padding:0.4rem 1rem; border-radius:999px; font-size:0.85rem; font-weight:600;
      border:2px solid var(--border); background:white; cursor:pointer; transition:all 0.15s; color:var(--text);
    }
    .filter-tab.active { border-color:var(--primary); background:var(--primary-light); color:var(--primary); }

    .search-bar { margin-bottom:1.25rem; }
    .search-bar input { width:100%; max-width:360px; padding:0.4rem 0.875rem; border:1px solid var(--border); border-radius:8px; font-size:0.875rem; }

    /* Volunteer card */
    .vol-card {
      border:1px solid var(--border); border-radius:12px; background:#fff;
      margin-bottom:0.875rem; overflow:hidden;
    }
    .vol-card-header {
      display:flex; align-items:flex-start; gap:1rem; padding:1rem 1.25rem;
      cursor:pointer; transition:background 0.12s;
    }
    .vol-card-header:hover { background:#f8fafc; }

    .vol-avatar {
      width:44px; height:44px; border-radius:50%; background:var(--primary-light);
      display:flex; align-items:center; justify-content:center;
      font-size:1rem; font-weight:700; color:var(--primary);
      overflow:hidden; flex-shrink:0;
    }
    .vol-avatar img { width:100%; height:100%; object-fit:cover; }

    .vol-info { flex:1; min-width:0; }
    .vol-name { font-weight:700; font-size:0.95rem; margin-bottom:0.15rem; }
    .vol-email { font-size:0.78rem; color:var(--text-muted); margin-bottom:0.5rem; }
    .vol-chips { display:flex; gap:0.4rem; flex-wrap:wrap; }
    .chip { font-size:0.73rem; font-weight:600; padding:2px 8px; border-radius:20px; background:#f1f5f9; color:#475569; }
    .chip.good  { background:#dcfce7; color:#166534; }
    .chip.warn  { background:#fee2e2; color:#991b1b; }
    .chip.info  { background:#eff6ff; color:#1d4ed8; }

    .vol-actions { display:flex; gap:0.5rem; flex-wrap:wrap; align-items:flex-start; padding-top:0.25rem; }

    /* Expanded panel */
    .vol-panel { display:none; border-top:1px solid var(--border); padding:1rem 1.25rem; background:#fafcff; }
    .vol-panel.open { display:block; }
    .vol-panel-title { font-size:0.82rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.75rem; }
    .gig-line {
      display:flex; align-items:center; justify-content:space-between;
      padding:0.45rem 0; border-bottom:1px solid var(--border); font-size:0.82rem; gap:0.5rem; flex-wrap:wrap;
    }
    .gig-line:last-child { border-bottom:none; }
    .gig-line-title { flex:1; min-width:0; font-weight:600; }
    .gig-line-date  { color:var(--text-muted); font-size:0.78rem; }
    .task-badge { font-size:0.72rem; font-weight:700; padding:2px 8px; border-radius:20px; }
    .task-accepted  { background:#dcfce7; color:#166534; }
    .task-pending   { background:#fef9c3; color:#854d0e; }
    .task-rejected  { background:#fee2e2; color:#991b1b; }
    .task-completed { background:#eff6ff; color:#1d4ed8; }
    .noshow-badge   { background:#fee2e2; color:#991b1b; font-size:0.72rem; font-weight:700; padding:2px 8px; border-radius:20px; }

    .empty-state { text-align:center; padding:4rem 1rem; color:var(--text-muted); }
    .stats-summary { display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1.5rem; }
    .stat-box { background:#fff; border:1px solid var(--border); border-radius:10px; padding:0.875rem 1.25rem; flex:1; min-width:130px; }
    .stat-box-val { font-size:1.4rem; font-weight:800; color:var(--primary); }
    .stat-box-lbl { font-size:0.78rem; color:var(--text-muted); margin-top:0.1rem; }
  </style>
</head>
<body>
<nav id="navbar"></nav>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<aside id="sidebar" class="sidebar"></aside>
<div class="page-content">
  <div class="container">
    <div class="page-header">
      <h1>Volunteer Tracker</h1>
      <p class="text-muted">All volunteers who have applied to your gigs</p>
    </div>

    <div class="stats-summary" id="summaryRow"></div>

    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('all',this)">All</button>
      <button class="filter-tab" onclick="setFilter('verified',this)">Verified</button>
      <button class="filter-tab" onclick="setFilter('recurring',this)">Recurring (2+ gigs)</button>
      <button class="filter-tab" onclick="setFilter('noshows',this)">Had No-shows</button>
    </div>

    <div class="search-bar">
      <input type="search" id="searchBox" placeholder="Search by name or email..." oninput="render()">
    </div>

    <div id="volList">
      <div style="text-align:center;padding:3rem"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/footer.js"></script>
<script>
API.requireAuth('org');

let volunteers = [];
let currentFilter = 'all';
let expandedId = null;

function initials(name) {
  return (name || '?').split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const q = (document.getElementById('searchBox').value || '').toLowerCase();
  let list = volunteers;

  if (currentFilter === 'verified')  list = list.filter(v => v.vp?.backgroundCheck === 'verified');
  if (currentFilter === 'recurring') list = list.filter(v => (v.sessionCount || 0) >= 2);
  if (currentFilter === 'noshows')   list = list.filter(v => (v.noShowCount || 0) > 0);
  if (q) list = list.filter(v => {
    const name = `${v.firstName||''} ${v.lastName||''}`.toLowerCase();
    return name.includes(q) || (v.email||'').toLowerCase().includes(q);
  });

  if (!list.length) {
    document.getElementById('volList').innerHTML = '<div class="empty-state">No volunteers found.</div>';
    return;
  }

  document.getElementById('volList').innerHTML = list.map(v => {
    const vp      = v.vp || {};
    const name    = `${v.firstName||''} ${v.lastName||''}`.trim() || v.email;
    const avatar  = v.avatarUrl || vp.avatarUrl;
    const hours   = v.qrHours != null && v.qrHours > 0 ? `${v.qrHours}h QR-tracked` : (vp.verifiedHours ? `${vp.verifiedHours}h verified` : null);
    const isOpen  = expandedId === v.id;

    const chips = [];
    if (v.sessionCount)  chips.push(`<span class="chip info">${v.sessionCount} gig${v.sessionCount!==1?'s':''}</span>`);
    if (hours)           chips.push(`<span class="chip good">${hours}</span>`);
    if (v.noShowCount)   chips.push(`<span class="chip warn">${v.noShowCount} no-show${v.noShowCount!==1?'s':''}</span>`);
    if (vp.points)       chips.push(`<span class="chip">${vp.points} pts</span>`);
    if (vp.backgroundCheck === 'verified') chips.push(`<span class="chip good">BG checked</span>`);
    if (vp.country)      chips.push(`<span class="chip">${vp.country}</span>`);
    if (vp.languages?.length) chips.push(`<span class="chip">${vp.languages.slice(0,2).join(', ')}</span>`);
    if (vp.skills?.length)    chips.push(`<span class="chip">${vp.skills.slice(0,2).join(', ')}</span>`);

    const gigLines = (v.tasks || []).map(t => {
      const gig = t.gig || {};
      const dateStr = gig.startDate ? new Date(gig.startDate+'T00:00:00').toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'}) : '';
      const today = new Date().toISOString().slice(0,10);
      const isPast = gig.endDate && gig.endDate < today;
      const isNoShow = isPast && ['approved','completed'].includes(t.status) && !t.attended;
      return `
      <div class="gig-line">
        <span class="gig-line-title">${gig.title || 'Gig'}</span>
        ${dateStr ? `<span class="gig-line-date">${dateStr}</span>` : ''}
        <span class="task-badge task-${t.status}">${t.status}</span>
        ${isNoShow ? `<span class="noshow-badge">No-show</span>` : ''}
      </div>`;
    }).join('');

    return `
    <div class="vol-card" id="vc-${v.id}">
      <div class="vol-card-header" onclick="toggleVol(${v.id})">
        <div class="vol-avatar">
          ${avatar ? `<img src="${avatar}" alt="${name}">` : initials(name)}
        </div>
        <div class="vol-info">
          <div class="vol-name">${name}</div>
          <div class="vol-email">${v.email || ''}</div>
          <div class="vol-chips">${chips.join('')}</div>
        </div>
        <div class="vol-actions">
          <a href="/org/applications?vol=${v.id}" class="btn btn-sm btn-secondary" onclick="event.stopPropagation()">Manage</a>
        </div>
      </div>
      <div class="vol-panel${isOpen ? ' open' : ''}" id="vp-${v.id}">
        ${v.tasks && v.tasks.length
          ? `<div class="vol-panel-title">Gig History (${v.tasks.length})</div>${gigLines}`
          : '<div style="color:var(--text-muted);font-size:0.85rem">No gig history.</div>'}
      </div>
    </div>`;
  }).join('');
}

function toggleVol(id) {
  expandedId = expandedId === id ? null : id;
  render();
}

async function load() {
  try {
    const { data } = await API.get('/orgs/me/volunteers');
    volunteers = data.volunteers || [];

    /* Summary row */
    const totalVols  = volunteers.length;
    const totalHours = volunteers.reduce((s, v) => s + (v.qrHours || v.vp?.verifiedHours || 0), 0);
    const noShows    = volunteers.filter(v => (v.noShowCount || 0) > 0).length;
    const recurring  = volunteers.filter(v => (v.sessionCount || 0) >= 2).length;
    document.getElementById('summaryRow').innerHTML = [
      { val: totalVols,            lbl: 'Total Volunteers' },
      { val: totalHours.toFixed(1), lbl: 'Total Hours' },
      { val: recurring,             lbl: 'Recurring Volunteers' },
      { val: noShows,               lbl: 'Had No-shows' },
    ].map(s => `<div class="stat-box"><div class="stat-box-val">${s.val}</div><div class="stat-box-lbl">${s.lbl}</div></div>`).join('');

    render();
  } catch (e) {
    document.getElementById('volList').innerHTML = `<div class="empty-state">${e.message || 'Could not load volunteers.'}</div>`;
  }
}

load();
</script>
</body>
</html>
