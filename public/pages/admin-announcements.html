<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Announcements | Admin | ImpactCircle</title>
  <link rel="stylesheet" href="/css/base.css">
  <style>
    .ann-layout { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; align-items:start; }
    @media(max-width:900px){ .ann-layout{ grid-template-columns:1fr; } }
    .target-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.625rem; margin-top:0.5rem; }
    .target-option { border:2px solid var(--border); border-radius:10px; padding:0.875rem 1rem; cursor:pointer; transition:border-color 0.15s,background 0.15s; }
    .target-option:hover { border-color:var(--primary); background:#f0f6ff; }
    .target-option.selected { border-color:var(--primary); background:#eff6ff; }
    .target-option input { display:none; }
    .target-label { font-weight:700; font-size:0.875rem; }
    .target-desc { font-size:0.75rem; color:var(--text-muted); margin-top:0.15rem; }
    .ann-history-item { border:1px solid var(--border); border-radius:10px; padding:1rem 1.25rem; margin-bottom:0.75rem; }
    .ann-title { font-weight:700; font-size:0.9rem; margin-bottom:0.2rem; }
    .ann-meta { font-size:0.75rem; color:var(--text-muted); display:flex; gap:0.75rem; flex-wrap:wrap; }
    .ann-body-preview { font-size:0.82rem; color:var(--text-muted); margin-top:0.4rem; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .group-badge { display:inline-block; padding:0.15rem 0.5rem; border-radius:20px; font-size:0.7rem; font-weight:700; }
    .gb-all      { background:#e6f0ff; color:#0066ff; }
    .gb-volunteers{ background:#effff6; color:#00a344; }
    .gb-orgs     { background:#fff9d6; color:#8a6a00; }
    .gb-inactive { background:#f3e8ff; color:#7e22ce; }
  </style>
</head>
<body>
<nav id="navbar"></nav>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<aside id="sidebar" class="sidebar"></aside>
<div class="page-content">
  <div class="container">
    <div class="page-header">
      <div class="page-header-row">
        <div><h1>Announcements</h1><p class="text-muted">Broadcast updates to volunteers and organizations</p></div>
        <a href="/admin" class="btn btn-secondary">← Admin Home</a>
      </div>
    </div>

    <div class="ann-layout">
      <!-- Compose Form -->
      <div class="card" style="padding:1.5rem">
        <h3 style="margin:0 0 1.25rem">New Announcement</h3>
        <div id="formAlert"></div>
        <div class="form-group">
          <label for="annTitle">Title <span class="required">*</span></label>
          <input type="text" id="annTitle" placeholder="e.g. Platform Maintenance Notice">
          <span class="field-error" id="annTitleErr"></span>
        </div>
        <div class="form-group">
          <label for="annBody">Message <span class="required">*</span></label>
          <textarea id="annBody" rows="5" placeholder="Write your announcement here…" style="width:100%;resize:vertical;padding:0.5rem 0.75rem;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:0.875rem;outline:none"></textarea>
          <span class="field-error" id="annBodyErr"></span>
        </div>
        <div class="form-group">
          <label>Send To <span class="required">*</span></label>
          <div class="target-grid">
            <label class="target-option" id="tgt-all" onclick="selectTarget('all')">
              <div class="target-label">Everyone</div>
              <div class="target-desc">All volunteers &amp; organizations</div>
            </label>
            <label class="target-option" id="tgt-volunteers" onclick="selectTarget('volunteers')">
              <div class="target-label">Volunteers only</div>
              <div class="target-desc">All registered volunteers</div>
            </label>
            <label class="target-option" id="tgt-orgs" onclick="selectTarget('orgs')">
              <div class="target-label">Organizations only</div>
              <div class="target-desc">All registered organizations</div>
            </label>
            <label class="target-option" id="tgt-inactive" onclick="selectTarget('inactive')">
              <div class="target-label">Inactive users</div>
              <div class="target-desc">No login in 30+ days</div>
            </label>
          </div>
          <span class="field-error" id="annTargetErr"></span>
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0">
          <input type="checkbox" id="annSendEmail" style="width:auto">
          <label for="annSendEmail" style="margin:0;font-weight:400;cursor:pointer">Also send as email to recipients</label>
        </div>
        <div style="margin-top:1.25rem">
          <button class="btn btn-primary" id="sendBtn" onclick="sendAnnouncement()">Send Announcement</button>
        </div>
      </div>

      <!-- History -->
      <div>
        <h3 style="margin:0 0 1rem">Recent Announcements</h3>
        <div id="historyList">
          <div style="text-align:center;padding:2rem"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/footer.js"></script>
<script>
API.requireAuth('admin');

const GROUP_LABELS = { all:'Everyone', volunteers:'Volunteers', orgs:'Organizations', inactive:'Inactive Users' };
const GROUP_CLASS  = { all:'gb-all', volunteers:'gb-volunteers', orgs:'gb-orgs', inactive:'gb-inactive' };

let selectedTarget = null;

function selectTarget(t) {
  selectedTarget = t;
  ['all','volunteers','orgs','inactive'].forEach(k => {
    document.getElementById('tgt-'+k).classList.toggle('selected', k === t);
  });
  document.getElementById('annTargetErr').textContent = '';
}

async function loadHistory() {
  try {
    const { data } = await API.get('/admin/announcements');
    const list = data.announcements || [];
    document.getElementById('historyList').innerHTML = list.length ? list.map(a => `
      <div class="ann-history-item">
        <div class="ann-title">${escHtml(a.title)}</div>
        <div class="ann-body-preview">${escHtml(a.body)}</div>
        <div class="ann-meta" style="margin-top:0.5rem">
          <span class="group-badge ${GROUP_CLASS[a.targetGroup]||'gb-all'}">${GROUP_LABELS[a.targetGroup]||a.targetGroup}</span>
          <span>${a.recipientCount} recipient${a.recipientCount !== 1 ? 's' : ''}</span>
          <span>${fmt.datetime ? fmt.datetime(a.createdAt) : new Date(a.createdAt).toLocaleString('en-CA',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span>
        </div>
      </div>`).join('')
      : '<div style="color:var(--text-muted);font-size:0.875rem;text-align:center;padding:2rem">No announcements sent yet.</div>';
  } catch(e) { document.getElementById('historyList').innerHTML = `<div class="alert alert-danger">${e.message}</div>`; }
}

async function sendAnnouncement() {
  const title = document.getElementById('annTitle').value.trim();
  const body  = document.getElementById('annBody').value.trim();
  let ok = true;
  document.getElementById('annTitleErr').textContent = '';
  document.getElementById('annBodyErr').textContent = '';
  document.getElementById('annTargetErr').textContent = '';
  document.getElementById('formAlert').innerHTML = '';
  if (!title) { document.getElementById('annTitleErr').textContent = 'Title is required.'; ok = false; }
  if (!body)  { document.getElementById('annBodyErr').textContent = 'Message is required.'; ok = false; }
  if (!selectedTarget) { document.getElementById('annTargetErr').textContent = 'Please select a target group.'; ok = false; }
  if (!ok) return;

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:14px;height:14px;border-width:2px;display:inline-block"></div> Sending…';

  try {
    const res = await API.post('/admin/announcements', {
      title, body,
      targetGroup: selectedTarget,
      sendEmails: document.getElementById('annSendEmail').checked,
    });
    Toast.success(res.message || 'Announcement sent!');
    document.getElementById('annTitle').value = '';
    document.getElementById('annBody').value = '';
    selectedTarget = null;
    ['all','volunteers','orgs','inactive'].forEach(k => document.getElementById('tgt-'+k).classList.remove('selected'));
    document.getElementById('annSendEmail').checked = false;
    loadHistory();
  } catch(e) {
    document.getElementById('formAlert').innerHTML = `<div class="alert alert-danger">${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send Announcement';
  }
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadHistory();
</script>
</body>
</html>
