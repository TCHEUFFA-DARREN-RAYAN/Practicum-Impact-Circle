<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Reward Management | Admin | ImpactCircle</title>
  <link rel="stylesheet" href="/css/base.css">
</head>
<body>
<nav id="navbar"></nav>
<div class="page-content">
  <div class="container">
    <div class="page-header">
      <div class="page-header-row">
        <div><h1> Reward Management</h1><p class="text-muted">Manage the reward catalogue, eligibility rules, and sponsors</p></div>
        <div style="display:flex;gap:0.75rem">
          <a href="/admin" class="btn btn-secondary">← Admin Home</a>
          <button class="btn btn-primary" onclick="openCreate()">+ Add Reward</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead><tr><th>Name</th><th>Category</th><th>Type</th><th>Pts Req.</th><th>Hours Req.</th><th>Sponsor</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="rewardTable"><tr><td colspan="8" style="text-align:center;padding:2rem"><div class="spinner"></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="rewardModal">
  <div class="modal" style="max-width:600px">
    <div class="modal-header"><h3 id="rewardModalTitle">Add Reward</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div id="rewardAlert"></div>
      <input type="hidden" id="rewardId">
      <div class="form-group"><label for="rwName">Reward Name <span class="required">*</span></label><input type="text" id="rwName" placeholder="e.g. Food Bank Champion Badge"><span class="field-error"></span></div>
      <div class="form-group"><label for="rwDesc">Description <span class="required">*</span></label><textarea id="rwDesc" rows="2" placeholder="Describe the reward..."></textarea><span class="field-error"></span></div>
      <div class="form-row">
        <div class="form-group"><label for="rwCat">Impact Category <span class="required">*</span></label><select id="rwCat"><option value="">Select...</option></select><span class="field-error"></span></div>
        <div class="form-group"><label for="rwType">Type <span class="required">*</span></label>
          <select id="rwType"><option value="perk">Perk</option><option value="discount">Discount/Voucher</option><option value="eventPass">Event Pass</option><option value="badge">Recognition Badge</option><option value="certificate">Certificate</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label for="rwPts">Min Points Required <span class="required">*</span></label><input type="number" id="rwPts" min="0" placeholder="200"><span class="field-error"></span></div>
        <div class="form-group"><label for="rwHrs">Min Category Hours <span class="required">*</span></label><input type="number" id="rwHrs" min="0" placeholder="10"><span class="field-error"></span></div>
      </div>
      <div class="form-group"><label for="rwSponsor">Sponsor Name</label><input type="text" id="rwSponsor" placeholder="e.g. Atlantic Tech Solutions or 'Platform'"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveReward()">Save Reward</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
API.requireAuth('admin');
let categories = [];

async function load() {
  try {
    const [rewardsRes, catsRes] = await Promise.all([API.get('/admin/rewards'), API.get('/admin/categories')]);
    categories = catsRes.data.categories;

    document.getElementById('rewardTable').innerHTML = rewardsRes.data.rewards.map(r => `
      <tr style="${r.isRetired ? 'opacity:0.55' : ''}">
        <td style="font-weight:600;max-width:200px">${r.name}</td>
        <td style="font-size:0.8rem">${r.categoryId?.name || '—'}</td>
        <td><span class="badge badge-primary">${r.type}</span></td>
        <td>${r.pointsRequired} pts</td>
        <td>${r.categoryHoursRequired}h</td>
        <td style="font-size:0.8rem">${r.sponsorName || '—'}</td>
        <td><span class="badge ${r.isRetired ? 'badge-rejected' : r.isActive ? 'badge-verified' : 'badge-pending'}">${r.isRetired ? 'Retired' : r.isActive ? 'Active' : 'Inactive'}</span></td>
        <td><div class="table-actions">
          ${!r.isRetired ? `<button class="btn btn-sm btn-secondary" onclick='editReward(${JSON.stringify(r)})'>Edit</button>
          <button class="btn btn-sm btn-danger" onclick="retireReward('${r._id}')">Retire</button>` : '<span class="text-muted" style="font-size:0.8rem">Retired</span>'}
        </div></td>
      </tr>
    `).join('');
  } catch (err) { Toast.error(err.message); }
}

function populateCats() {
  document.getElementById('rwCat').innerHTML = '<option value="">Select category...</option>' + categories.filter(c => c.isActive).map(c => `<option value="${c._id}">${c.icon} ${c.name}</option>`).join('');
}

function openCreate() {
  document.getElementById('rewardId').value = '';
  ['rwName','rwDesc','rwSponsor'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('rwPts').value = '100';
  document.getElementById('rwHrs').value = '5';
  document.getElementById('rwType').value = 'perk';
  document.getElementById('rwCat').value = '';
  document.getElementById('rewardModalTitle').textContent = 'Add Reward';
  document.getElementById('rewardAlert').innerHTML = '';
  populateCats();
  document.getElementById('rewardModal').classList.add('open');
}

function editReward(r) {
  document.getElementById('rewardId').value = r._id;
  document.getElementById('rwName').value = r.name;
  document.getElementById('rwDesc').value = r.description;
  document.getElementById('rwPts').value = r.pointsRequired;
  document.getElementById('rwHrs').value = r.categoryHoursRequired;
  document.getElementById('rwType').value = r.type;
  document.getElementById('rwSponsor').value = r.sponsorName || '';
  document.getElementById('rewardModalTitle').textContent = 'Edit Reward';
  document.getElementById('rewardAlert').innerHTML = '';
  populateCats();
  document.getElementById('rwCat').value = r.categoryId?._id || r.categoryId || '';
  document.getElementById('rewardModal').classList.add('open');
}

async function saveReward() {
  const id = document.getElementById('rewardId').value;
  const name = document.getElementById('rwName').value.trim();
  const desc = document.getElementById('rwDesc').value.trim();
  const cat = document.getElementById('rwCat').value;
  const pts = parseInt(document.getElementById('rwPts').value);
  const hrs = parseFloat(document.getElementById('rwHrs').value);
  let valid = true;
  if (!name) { Validator.showError(document.getElementById('rwName'), 'Required.'); valid = false; }
  if (!desc) { Validator.showError(document.getElementById('rwDesc'), 'Required.'); valid = false; }
  if (!cat) { Validator.showError(document.getElementById('rwCat'), 'Required.'); valid = false; }
  if (isNaN(pts) || pts < 0) { Validator.showError(document.getElementById('rwPts'), 'Must be ≥ 0.'); valid = false; }
  if (isNaN(hrs) || hrs < 0) { Validator.showError(document.getElementById('rwHrs'), 'Must be ≥ 0.'); valid = false; }
  if (!valid) return;

  const payload = { name, description: desc, categoryId: cat, type: document.getElementById('rwType').value, pointsRequired: pts, categoryHoursRequired: hrs, sponsorName: document.getElementById('rwSponsor').value.trim() };
  try {
    if (id) await API.put(`/admin/rewards/${id}`, payload);
    else await API.post('/admin/rewards', payload);
    Toast.success('Reward saved!'); closeModal(); load();
  } catch (err) { document.getElementById('rewardAlert').innerHTML = `<div class="alert alert-danger">${err.message}</div>`; }
}

async function retireReward(id) {
  if (!confirm('Retire this reward? It will be hidden from volunteers but kept for records.')) return;
  try { await API.patch(`/admin/rewards/${id}/retire`, {}); Toast.success('Reward retired.'); load(); } catch (err) { Toast.error(err.message); }
}

function closeModal() { document.getElementById('rewardModal').classList.remove('open'); }
load();
</script>
</body>
</html>
