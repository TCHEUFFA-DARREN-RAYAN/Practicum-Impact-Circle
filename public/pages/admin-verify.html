<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Verification Queue | Admin | ImpactCircle</title>
  <link rel="stylesheet" href="/css/base.css">
</head>
<body>
<nav id="navbar"></nav>
<div class="page-content">
  <div class="container">
    <div class="page-header">
      <div class="page-header-row">
        <div><h1> Verification Queue</h1><p class="text-muted">Review and approve volunteer and organization accounts</p></div>
        <a href="/admin" class="btn btn-secondary">← Admin Home</a>
      </div>
    </div>

    <div class="filters mb-4">
      <div class="filters-row">
        <div class="filter-group"><label>Status</label><select id="statusFilter"><option value="pending">Pending</option><option value="verified">Verified</option><option value="rejected">Rejected</option></select></div>
        <div class="filter-group"><label>Role</label><select id="roleFilter"><option value="">All Roles</option><option value="volunteer">Volunteers</option><option value="org">Organizations</option></select></div>
        <div class="filter-group" style="flex:1"></div>
        <button class="btn btn-primary" onclick="load()"> Refresh</button>
      </div>
    </div>

    <div id="verifyList"><div class="loading-overlay"><div class="spinner spinner-lg"></div></div></div>
  </div>
</div>

<!-- Verify Modal -->
<div class="modal-backdrop" id="verifyModal">
  <div class="modal">
    <div class="modal-header"><h3 id="modalTitle">Review Application</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div id="modalAlert"></div>
      <div id="modalInfo" style="margin-bottom:1rem"></div>
      <div class="form-group">
        <label for="rejReason">Rejection Reason (required if rejecting)</label>
        <textarea id="rejReason" rows="3" placeholder="Explain why you are rejecting this application..."></textarea>
        <span class="field-error"></span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" id="rejectBtn">Reject</button>
      <button class="btn btn-success" id="approveBtn">Verify </button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
API.requireAuth('admin');
let currentUserId = null;

async function load() {
  const status = document.getElementById('statusFilter').value;
  const role = document.getElementById('roleFilter').value;
  document.getElementById('verifyList').innerHTML = '<div class="loading-overlay"><div class="spinner spinner-lg"></div></div>';
  try {
    const q = new URLSearchParams({ status });
    if (role) q.set('role', role);
    const { data } = await API.get(`/admin/verifications?${q}`);

    document.getElementById('verifyList').innerHTML = data.users.length ? data.users.map(u => `
      <div class="card mb-3">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem">
              <div class="nav-avatar" style="width:40px;height:40px;font-size:1rem">${u.email[0].toUpperCase()}</div>
              <div>
                <div style="font-weight:700">${u.email}</div>
                <div style="display:flex;gap:0.5rem;margin-top:0.25rem">
                  <span class="badge badge-primary">${u.role}</span>
                  <span class="badge ${u.verificationStatus === 'verified' ? 'badge-verified' : u.verificationStatus === 'rejected' ? 'badge-rejected' : 'badge-pending'}">${u.verificationStatus}</span>
                </div>
              </div>
            </div>
            ${u.profile ? `
              <div style="font-size:0.8rem;color:var(--text-muted)">
                Name: ${u.profile.firstName || ''} ${u.profile.lastName || ''} · Phone: ${u.profile.phone || 'N/A'} · Registered: ${fmt.date(u.createdAt)}
              </div>
              ${u.profile.documents?.govId ? `<div style="margin-top:0.5rem"><span class="badge badge-info"> Gov ID uploaded</span></div>` : ''}
              ${u.profile.documents?.backgroundCheck ? `<span class="badge badge-info"> Background check uploaded</span>` : ''}
            ` : ''}
            ${u.org ? `<div style="font-size:0.8rem;color:var(--text-muted)">Org: ${u.org.orgName} · ${u.org.address || 'N/A'} · Registered: ${fmt.date(u.createdAt)}</div>` : ''}
            ${u.rejectionReason ? `<div class="alert alert-danger" style="margin-top:0.5rem;padding:0.4rem 0.75rem;font-size:0.8rem">Rejected: ${u.rejectionReason}</div>` : ''}
          </div>
          ${status === 'pending' ? `
            <div style="display:flex;flex-direction:column;gap:0.375rem">
              <button class="btn btn-success btn-sm" onclick="openVerify('${u._id}','${u.email.replace(/'/g,"\\'")}','${u.role}')">Approve </button>
              <button class="btn btn-danger btn-sm" onclick="openReject('${u._id}','${u.email.replace(/'/g,"\\'")}','${u.role}')">Reject</button>
            </div>
          ` : ''}
        </div>
      </div>
    `).join('') : '<div class="empty-state"><div class="empty-icon"></div><h3>No entries found</h3><p>All caught up with this filter!</p></div>';
  } catch (err) { Toast.error(err.message); }
}

function openVerify(id, email, role) {
  currentUserId = id;
  document.getElementById('modalTitle').textContent = `Verify ${role}: ${email}`;
  document.getElementById('modalInfo').innerHTML = `<p>You are about to <strong>verify</strong> this ${role} account. They will receive a confirmation email and gain full platform access.</p>`;
  document.getElementById('rejReason').value = '';
  document.getElementById('modalAlert').innerHTML = '';
  document.getElementById('verifyModal').classList.add('open');
  document.getElementById('approveBtn').onclick = () => submitDecision('verified');
  document.getElementById('rejectBtn').onclick = () => submitDecision('rejected');
}

function openReject(id, email, role) { openVerify(id, email, role); }

async function submitDecision(status) {
  const reason = document.getElementById('rejReason').value.trim();
  if (status === 'rejected' && reason.length < 5) { Validator.showError(document.getElementById('rejReason'), 'Please provide a reason.'); return; }
  try {
    await API.patch(`/admin/verify/${currentUserId}`, { status, reason });
    Toast.success(`Account ${status}!`);
    closeModal();
    load();
  } catch (err) { document.getElementById('modalAlert').innerHTML = `<div class="alert alert-danger">${err.message}</div>`; }
}

function closeModal() { document.getElementById('verifyModal').classList.remove('open'); }

document.getElementById('statusFilter').addEventListener('change', load);
document.getElementById('roleFilter').addEventListener('change', load);
load();
</script>
</body>
</html>
