<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Manage Organizations | Admin | ImpactCircle</title>
  <link rel="stylesheet" href="/css/base.css">
  <style>
    .detail-row { display:flex; gap:0.5rem; margin-bottom:0.5rem; font-size:0.875rem; }
    .detail-label { font-weight:700; min-width:130px; color:var(--text-muted); }
  </style>
</head>
<body>
<nav id="navbar"></nav>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<aside id="sidebar" class="sidebar"></aside>
<div class="page-content">
  <div class="container">
    <div class="page-header">
      <div class="page-header-row">
        <div><h1>Manage Organizations</h1><p class="text-muted">Registered nonprofits and community partners</p></div>
        <div style="display:flex;gap:0.75rem">
          <a href="/admin/verify" class="btn btn-primary">Approvals queue</a>
          <a href="/admin" class="btn btn-secondary">← Admin Home</a>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead><tr><th>Organization</th><th>Account email</th><th>Verification</th><th>Location</th><th>Actions</th></tr></thead>
          <tbody id="tbl"><tr><td colspan="5" class="text-center" style="padding:2rem"><div class="spinner"></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- View modal -->
<div class="modal-backdrop" id="viewModal">
  <div class="modal" style="max-width:640px">
    <div class="modal-header"><h3 id="viewTitle">Organization Details</h3><button class="modal-close" onclick="closeModal('viewModal')">×</button></div>
    <div class="modal-body" id="viewBody"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('viewModal')">Close</button>
      <button class="btn btn-warning" onclick="openEdit(currentOrgId)">Edit</button>
      <button class="btn btn-danger" onclick="deleteOrg()">Deactivate</button>
    </div>
  </div>
</div>

<!-- Edit modal -->
<div class="modal-backdrop" id="editModal">
  <div class="modal" style="max-width:560px">
    <div class="modal-header"><h3>Edit Organization</h3><button class="modal-close" onclick="closeModal('editModal')">×</button></div>
    <div class="modal-body">
      <div id="editAlert"></div>
      <div class="form-row">
        <div class="form-group"><label>Organization Name <span class="required">*</span></label><input type="text" id="eOrgName"><span class="field-error"></span></div>
        <div class="form-group"><label>Address <span class="required">*</span></label><input type="text" id="eAddress"><span class="field-error"></span></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Contact Name <span class="required">*</span></label><input type="text" id="eContactName"><span class="field-error"></span></div>
        <div class="form-group"><label>Contact Email</label><input type="email" id="eContactEmail"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Contact Phone</label><input type="text" id="eContactPhone"></div>
        <div class="form-group"><label>Website</label><input type="url" id="eWebsite"></div>
      </div>
      <div class="form-group"><label>Mission Statement <span class="required">*</span></label><textarea id="eMission" rows="3"></textarea><span class="field-error"></span></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('editModal')">Cancel</button>
      <button class="btn btn-primary" id="saveEditBtn" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/footer.js"></script>
<script>
API.requireAuth('admin');
let currentOrgId = null;
let currentOrgIsDeactivated = false;

async function load() {
  try {
    const { data } = await API.get('/admin/organizations');
    const rows = data.organizations || [];
    document.getElementById('tbl').innerHTML = rows.length ? rows.map(o => {
      const u = o.User || o.user;
      const st = u ? u.verificationStatus : '—';
      return `<tr data-org-id="${o.id}">
        <td style="font-weight:600">${o.orgName || '—'}${u?.isBlocked ? ' <span class="badge badge-rejected" style="font-size:0.68rem">Blocked</span>' : ''}</td>
        <td>${u ? u.email : '—'}</td>
        <td><span class="badge ${st === 'verified' ? 'badge-verified' : st === 'rejected' ? 'badge-rejected' : 'badge-pending'}">${st}</span></td>
        <td style="font-size:0.85rem;color:var(--text-muted)">${o.address || '—'}</td>
        <td>
          <div style="display:flex;gap:0.375rem;flex-wrap:wrap">
            <button class="btn btn-sm btn-secondary" onclick="viewOrg('${o.id}')">View</button>
            <button class="btn btn-sm btn-warning" onclick="openEdit('${o.id}')">Edit</button>
            ${!(u?.isBlocked || u?.verificationStatus === 'rejected') ? `<button class="btn btn-sm btn-danger" onclick="confirmDelete('${o.id}')">Deactivate</button>` : `<span class="badge badge-rejected" style="font-size:0.7rem;padding:0.3rem 0.6rem">Deactivated</span>`}
          </div>
        </td>
      </tr>`;
    }).join('') : '<tr><td colspan="5" class="text-center text-muted" style="padding:2rem">No organizations yet.</td></tr>';
  } catch (e) { Toast.error(e.message); }
}

async function viewOrg(id) {
  currentOrgId = id;
  document.getElementById('viewBody').innerHTML = '<div style="padding:2rem;text-align:center"><div class="spinner"></div></div>';
  document.getElementById('viewModal').classList.add('open');
  try {
    const { data } = await API.get(`/admin/organizations/${id}`);
    const o = data.organization;
    const u = o.User || o.user;
    currentOrgIsDeactivated = !!(u?.isBlocked || u?.verificationStatus === 'rejected');
    const deactivateBtn = document.querySelector('#viewModal .modal-footer .btn-danger');
    if (deactivateBtn) deactivateBtn.style.display = currentOrgIsDeactivated ? 'none' : '';
    document.getElementById('viewTitle').textContent = o.orgName;
    document.getElementById('viewBody').innerHTML = `
      <div class="detail-row"><span class="detail-label">Organization</span><span>${o.orgName}</span></div>
      <div class="detail-row"><span class="detail-label">Account Email</span><span>${u?.email || '—'}</span></div>
      <div class="detail-row"><span class="detail-label">Verification</span><span class="badge ${u?.verificationStatus === 'verified' ? 'badge-verified' : u?.verificationStatus === 'rejected' ? 'badge-rejected' : 'badge-pending'}">${u?.verificationStatus || '—'}</span></div>
      <div class="detail-row"><span class="detail-label">Blocked</span><span>${u?.isBlocked ? '<strong style="color:#dc2626">Yes</strong>' : 'No'}</span></div>
      <div class="detail-row"><span class="detail-label">Address</span><span>${o.address || '—'}</span></div>
      <div class="detail-row"><span class="detail-label">Contact</span><span>${o.contactName || '—'} · ${o.contactEmail || '—'}</span></div>
      <div class="detail-row"><span class="detail-label">Phone</span><span>${o.contactPhone || '—'}</span></div>
      <div class="detail-row"><span class="detail-label">Website</span><span>${o.website || '—'}</span></div>
      <div class="detail-row"><span class="detail-label">Total hours</span><span>${o.totalFacilitatedHours || 0}h</span></div>
      ${o.missionStatement ? `<div class="detail-row"><span class="detail-label">Mission</span><span>${o.missionStatement}</span></div>` : ''}`;
  } catch (e) {
    document.getElementById('viewBody').innerHTML = `<div class="alert alert-danger">${e.message}</div>`;
  }
}

async function openEdit(id) {
  currentOrgId = id;
  closeModal('viewModal');
  document.getElementById('editAlert').innerHTML = '';
  document.getElementById('editModal').classList.add('open');
  try {
    const { data } = await API.get(`/admin/organizations/${id}`);
    const o = data.organization;
    document.getElementById('eOrgName').value     = o.orgName || '';
    document.getElementById('eAddress').value     = o.address || '';
    document.getElementById('eContactName').value = o.contactName || '';
    document.getElementById('eContactEmail').value= o.contactEmail || '';
    document.getElementById('eContactPhone').value= o.contactPhone || '';
    document.getElementById('eWebsite').value     = o.website || '';
    document.getElementById('eMission').value     = o.missionStatement || '';
  } catch (e) { document.getElementById('editAlert').innerHTML = `<div class="alert alert-danger">${e.message}</div>`; }
}

async function saveEdit() {
  if (!currentOrgId) return;
  document.getElementById('editAlert').innerHTML = '';

  const orgNameEl    = document.getElementById('eOrgName');
  const contactNameEl= document.getElementById('eContactName');
  const addressEl    = document.getElementById('eAddress');
  const missionEl    = document.getElementById('eMission');

  // Clear previous errors
  [orgNameEl, contactNameEl, addressEl, missionEl].forEach(el => {
    el.classList.remove('error');
    const err = el.closest('.form-group')?.querySelector('.field-error');
    if (err) { err.textContent = ''; err.classList.remove('show'); }
  });

  let valid = true;
  if (!orgNameEl.value.trim()) {
    orgNameEl.classList.add('error');
    Validator.showError(orgNameEl, 'Organization name is required.'); valid = false;
  }
  if (!contactNameEl.value.trim()) {
    Validator.showError(contactNameEl, 'Contact name is required.'); valid = false;
  }
  if (!addressEl.value.trim()) {
    Validator.showError(addressEl, 'Address is required.'); valid = false;
  }
  if (missionEl.value.trim().length > 0 && missionEl.value.trim().length < 20) {
    Validator.showError(missionEl, 'Mission statement must be at least 20 characters.'); valid = false;
  }
  if (!missionEl.value.trim()) {
    Validator.showError(missionEl, 'Mission statement is required.'); valid = false;
  }
  if (!valid) return;

  const btn = document.getElementById('saveEditBtn');
  btn.disabled = true;
  try {
    await API.put(`/admin/organizations/${currentOrgId}`, {
      orgName: orgNameEl.value.trim(),
      address: addressEl.value.trim(),
      contactName: contactNameEl.value.trim(),
      contactEmail: document.getElementById('eContactEmail').value.trim(),
      contactPhone: document.getElementById('eContactPhone').value.trim(),
      website: document.getElementById('eWebsite').value.trim(),
      missionStatement: missionEl.value.trim(),
    });
    Toast.success('Organization updated.');
    closeModal('editModal');
    /* Update row name optimistically */
    const row = document.querySelector(`[data-org-id="${currentOrgId}"]`);
    if (row) { const firstTd = row.querySelector('td:first-child'); if (firstTd) firstTd.childNodes[0].textContent = orgNameEl.value.trim(); }
    load();
  } catch (e) { document.getElementById('editAlert').innerHTML = `<div class="alert alert-danger">${e.message}</div>`; }
  finally { btn.disabled = false; }
}

async function deleteOrg() {
  if (!currentOrgId || !confirm('Deactivate this organization? Their account will be blocked. Data is preserved.')) return;
  try {
    await API.delete(`/admin/organizations/${currentOrgId}`);
    Toast.success('Organization deactivated.');
    /* Optimistic: mark row as deactivated immediately */
    const row = document.querySelector(`[data-org-id="${currentOrgId}"]`);
    if (row) {
      const actionCell = row.querySelector('td:last-child div');
      if (actionCell) actionCell.innerHTML = '<span class="badge badge-rejected" style="font-size:0.7rem;padding:0.3rem 0.6rem">Deactivated</span>';
    }
    closeModal('viewModal');
    load();
  } catch (e) { Toast.error(e.message); }
}

async function confirmDelete(id) {
  currentOrgId = id;
  deleteOrg();
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
load();
</script>
</body>
</html>
