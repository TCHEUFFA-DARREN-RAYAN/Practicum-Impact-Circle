<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Announcements | ImpactCircle</title>
  <link rel="stylesheet" href="/css/base.css">
  <style>
    .ann-layout { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; align-items:start; }
    @media(max-width:900px){ .ann-layout{ grid-template-columns:1fr; } }
    .ann-history-item { border:1px solid var(--border); border-radius:10px; padding:1rem 1.25rem; margin-bottom:0.75rem; background:#fff; }
    .ann-title { font-weight:700; font-size:0.9rem; margin-bottom:0.2rem; }
    .ann-meta { font-size:0.75rem; color:var(--text-muted); display:flex; gap:0.75rem; flex-wrap:wrap; margin-top:0.35rem; }
    .ann-body-preview { font-size:0.82rem; color:var(--text-muted); margin-top:0.4rem; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .info-box { background:#f0f6ff; border:1px solid #bfdbfe; border-radius:10px; padding:0.875rem 1.1rem; margin-bottom:1.25rem; font-size:0.85rem; color:#1e40af; display:flex; gap:0.625rem; align-items:flex-start; }
    .info-box svg { flex-shrink:0; margin-top:1px; }
  </style>
</head>
<body>
<nav id="navbar"></nav>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<aside id="sidebar" class="sidebar"></aside>
<div class="page-content">
  <div class="container">
    <div class="page-header">
      <div class="page-header-row">
        <div><h1>Announcements</h1><p class="text-muted">Send updates to your approved volunteers</p></div>
        <a href="/org-dashboard" class="btn btn-secondary">← Dashboard</a>
      </div>
    </div>

    <div class="ann-layout">
      <!-- Compose Form -->
      <div class="card" style="padding:1.5rem">
        <h3 style="margin:0 0 1rem">New Announcement</h3>

        <div class="info-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span>This will send an in-app notification to all volunteers with an <strong>approved</strong> application for one of your gigs.</span>
        </div>

        <div id="formAlert"></div>
        <div class="form-group">
          <label for="annTitle">Title <span class="required">*</span></label>
          <input type="text" id="annTitle" placeholder="e.g. Shift reminder for this weekend">
          <span class="field-error" id="annTitleErr"></span>
        </div>
        <div class="form-group">
          <label for="annBody">Message <span class="required">*</span></label>
          <textarea id="annBody" rows="5" placeholder="Write your announcement here…" style="width:100%;resize:vertical;padding:0.5rem 0.75rem;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:0.875rem;outline:none;line-height:1.5"></textarea>
          <span class="field-error" id="annBodyErr"></span>
        </div>
        <div style="margin-top:0.25rem">
          <button class="btn btn-primary" id="sendBtn" onclick="sendAnnouncement()">Send to My Volunteers</button>
        </div>
      </div>

      <!-- Sent history (stored in sessionStorage for this session) -->
      <div>
        <h3 style="margin:0 0 1rem">Sent This Session</h3>
        <div id="historyList">
          <div style="color:var(--text-muted);font-size:0.875rem;text-align:center;padding:2rem">No announcements sent yet this session.</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/footer.js"></script>
<script>
API.requireAuth('org');

let sessionHistory = [];

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderHistory() {
  if (!sessionHistory.length) {
    document.getElementById('historyList').innerHTML =
      '<div style="color:var(--text-muted);font-size:0.875rem;text-align:center;padding:2rem">No announcements sent yet this session.</div>';
    return;
  }
  document.getElementById('historyList').innerHTML = sessionHistory.map(a => `
    <div class="ann-history-item">
      <div class="ann-title">${escHtml(a.title)}</div>
      <div class="ann-body-preview">${escHtml(a.body)}</div>
      <div class="ann-meta">
        <span style="color:#22c55e;font-weight:600">&#x2713; Sent to ${a.recipientCount} volunteer${a.recipientCount !== 1 ? 's' : ''}</span>
        <span>${new Date(a.sentAt).toLocaleTimeString('en-CA', { hour:'2-digit', minute:'2-digit' })}</span>
      </div>
    </div>`).join('');
}

async function sendAnnouncement() {
  const title = document.getElementById('annTitle').value.trim();
  const body  = document.getElementById('annBody').value.trim();
  let ok = true;
  document.getElementById('annTitleErr').textContent = '';
  document.getElementById('annBodyErr').textContent = '';
  document.getElementById('formAlert').innerHTML = '';
  if (!title) { document.getElementById('annTitleErr').textContent = 'Title is required.'; ok = false; }
  if (!body)  { document.getElementById('annBodyErr').textContent = 'Message is required.'; ok = false; }
  if (!ok) return;

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:14px;height:14px;border-width:2px;display:inline-block"></div> Sending…';

  try {
    const res = await API.post('/orgs/me/announcements', { title, body });
    const count = res.data?.recipientCount ?? 0;
    Toast.success(res.message || `Announcement sent to ${count} volunteers!`);
    sessionHistory.unshift({ title, body, recipientCount: count, sentAt: new Date().toISOString() });
    renderHistory();
    document.getElementById('annTitle').value = '';
    document.getElementById('annBody').value = '';
  } catch(e) {
    document.getElementById('formAlert').innerHTML = `<div class="alert alert-danger">${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send to My Volunteers';
  }
}
</script>
</body>
</html>
