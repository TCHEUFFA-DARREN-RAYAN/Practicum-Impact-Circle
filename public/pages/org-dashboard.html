<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organization Dashboard | ImpactCircle</title>
  <link rel="stylesheet" href="/css/base.css">
</head>
<body>
<nav id="navbar"></nav>
<div class="page-content">
  <div class="container">
    <div class="page-header">
      <div class="page-header-row">
        <div><h1 id="orgName">Organization Dashboard</h1><p class="text-muted">Manage your gigs, volunteers, and task approvals</p></div>
        <a href="/org-gig-create" class="btn btn-primary">+ Post New Gig</a>
      </div>
    </div>

    <div id="verifyWarning"></div>

    <!-- Stats -->
    <div class="grid grid-4 mb-4">
      <div class="stat-card"><div class="stat-label">Total Gigs</div><div class="stat-value" id="sTotal">—</div></div>
      <div class="stat-card"><div class="stat-label">Open Gigs</div><div class="stat-value" id="sOpen">—</div></div>
      <div class="stat-card"><div class="stat-label">Pending Approvals</div><div class="stat-value" id="sPending">—</div></div>
      <div class="stat-card"><div class="stat-label">Hours Facilitated</div><div class="stat-value" id="sHours">—</div></div>
    </div>

    <!-- Tabs -->
    <div style="display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:1.5rem">
      <button class="btn btn-ghost tab-btn active" data-tab="gigs">My Gigs</button>
      <button class="btn btn-ghost tab-btn" data-tab="pending">Pending Approvals <span id="pendingBadge" class="badge badge-pending" style="display:none"></span></button>
    </div>

    <!-- Gigs Tab -->
    <div id="tab-gigs">
      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead><tr><th>Gig Title</th><th>Category</th><th>Date</th><th>Status</th><th>Applicants</th><th>Actions</th></tr></thead>
            <tbody id="gigsTable"><tr><td colspan="6" style="text-align:center;padding:2rem"><div class="spinner"></div></td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Pending Tab -->
    <div id="tab-pending" style="display:none">
      <div id="pendingList"><div class="loading-overlay"><div class="spinner"></div></div></div>
    </div>
  </div>
</div>

<!-- Applicants Modal -->
<div class="modal-backdrop" id="applicantsModal">
  <div class="modal" style="max-width:700px">
    <div class="modal-header"><h3 id="applicantsTitle">Applicants</h3><button class="modal-close" onclick="closeModal('applicantsModal')">×</button></div>
    <div class="modal-body" id="applicantsBody"></div>
  </div>
</div>

<!-- Verify Task Modal -->
<div class="modal-backdrop" id="verifyModal">
  <div class="modal">
    <div class="modal-header"><h3>Verify Task Completion</h3><button class="modal-close" onclick="closeModal('verifyModal')">×</button></div>
    <div class="modal-body">
      <div id="verifyAlert"></div>
      <p id="verifyDesc" style="margin-bottom:1rem"></p>
      <div class="form-group">
        <label for="rejectReason">Reason (required if rejecting)</label>
        <textarea id="rejectReason" rows="3" placeholder="Explain why you are rejecting this completion..."></textarea>
        <span class="field-error"></span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('verifyModal')">Cancel</button>
      <button class="btn btn-danger" id="rejectBtn">Reject</button>
      <button class="btn btn-success" id="approveBtn">Approve </button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
API.requireAuth('org');
let pendingTasks = [], currentTaskId = null;

async function load() {
  try {
    const { data } = await API.get('/orgs/me/dashboard');
    const { org, gigs, pendingTasks: pt, stats } = data;
    pendingTasks = pt;

    document.getElementById('orgName').textContent = org.orgName + ' — Dashboard';
    document.getElementById('sTotal').textContent = stats.totalGigs;
    document.getElementById('sOpen').textContent = stats.openGigs;
    document.getElementById('sPending').textContent = stats.pendingApprovals;
    document.getElementById('sHours').textContent = stats.totalFacilitatedHours.toFixed(1);

    const user = API.getUser();
    const userFull = await API.get('/auth/me');
    if (userFull.data.user.verificationStatus !== 'verified') {
      document.getElementById('verifyWarning').innerHTML = `<div class="alert alert-warning mb-4">⏳ Your organization is pending admin verification. You cannot post gigs until approved.</div>`;
    }

    if (pt.length) { document.getElementById('pendingBadge').textContent = pt.length; document.getElementById('pendingBadge').style.display = 'inline-flex'; }

    // Gigs table
    document.getElementById('gigsTable').innerHTML = gigs.length ? gigs.map(g => `
      <tr>
        <td><div style="font-weight:600">${g.title}</div><div style="font-size:0.775rem;color:var(--text-muted)">${g.location?.type === 'remote' ? 'Remote' : g.location?.address || 'In-person'}</div></td>
        <td><span class="cat-pill" style="background:${g.categoryId?.colorHex}22;color:${g.categoryId?.colorHex}">${g.categoryId?.icon} ${g.categoryId?.name}</span></td>
        <td style="font-size:0.8rem">${fmt.date(g.startDate)}</td>
        <td><span class="badge ${g.status === 'open' ? 'badge-open' : 'badge-closed'}">${g.status}</span></td>
        <td><span class="badge badge-primary">${g.applicantCount || 0}</span></td>
        <td><div class="table-actions">
          <button class="btn btn-sm btn-secondary" onclick="viewApplicants('${g._id}','${g.title.replace(/'/g,"\\'")}')">Applicants</button>
          ${g.status === 'open' ? `<button class="btn btn-sm btn-danger" onclick="cancelGig('${g._id}')">Cancel</button>` : ''}
        </div></td>
      </tr>
    `).join('') : '<tr><td colspan="6" class="text-center text-muted" style="padding:2rem">No gigs yet. <a href="/org-gig-create">Post your first gig →</a></td></tr>';

    // Pending tasks
    document.getElementById('pendingList').innerHTML = pt.length ? pt.map(t => `
      <div class="card mb-3">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem">
          <div>
            <div style="font-weight:700">${t.gigId?.title || 'Task'}</div>
            <div style="font-size:0.8rem;color:var(--text-muted);margin-top:0.25rem">Volunteer: ${t.volunteerId?.email || 'N/A'} · Submitted: ${fmt.fromNow(t.submittedAt)}</div>
            <div style="font-size:0.8rem;color:var(--warning);margin-top:0.25rem">⏰ Auto-approved in ${Math.max(0, 30 - Math.floor((Date.now() - new Date(t.submittedAt).getTime()) / 86400000))} days if not reviewed</div>
          </div>
          <div style="display:flex;gap:0.5rem">
            <button class="btn btn-success btn-sm" onclick="openVerify('${t._id}','${(t.gigId?.title || '').replace(/'/g,"\\'")}','${t.volunteerId?.email || ''}','approve')">Approve </button>
            <button class="btn btn-danger btn-sm" onclick="openVerify('${t._id}','${(t.gigId?.title || '').replace(/'/g,"\\'")}','${t.volunteerId?.email || ''}','reject')">Reject</button>
          </div>
        </div>
      </div>
    `).join('') : '<div class="empty-state"><div class="empty-icon"></div><h3>All caught up!</h3><p>No pending task approvals.</p></div>';

  } catch (err) { Toast.error('Failed to load: ' + err.message); }
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-gigs').style.display = btn.dataset.tab === 'gigs' ? 'block' : 'none';
    document.getElementById('tab-pending').style.display = btn.dataset.tab === 'pending' ? 'block' : 'none';
  });
});

async function viewApplicants(gigId, title) {
  document.getElementById('applicantsTitle').textContent = `Applicants — ${title}`;
  document.getElementById('applicantsBody').innerHTML = '<div class="loading-overlay"><div class="spinner"></div></div>';
  document.getElementById('applicantsModal').classList.add('open');
  try {
    const { data } = await API.get(`/gigs/${gigId}/applications`);
    document.getElementById('applicantsBody').innerHTML = data.applications.length ? data.applications.map(a => `
      <div style="padding:0.875rem;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:0.75rem">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:1rem">
          <div style="flex:1">
            <div style="font-weight:600;font-size:0.9rem">${a.volunteerId?.email || 'N/A'}</div>
            <span class="badge ${a.volunteerId?.verificationStatus === 'verified' ? 'badge-verified' : 'badge-pending'}" style="margin-top:0.25rem">${a.volunteerId?.verificationStatus || 'unknown'}</span>
            <p style="font-size:0.825rem;color:var(--text-muted);margin-top:0.625rem;line-height:1.5">${a.personalStatement}</p>
            <div style="font-size:0.775rem;color:var(--text-muted)">${fmt.date(a.createdAt)}</div>
          </div>
          <div>
            ${a.status === 'pending' ? `
              <div style="display:flex;flex-direction:column;gap:0.375rem">
                <button class="btn btn-success btn-sm" onclick="decide('${a._id}','approved')">Approve</button>
                <button class="btn btn-danger btn-sm" onclick="decide('${a._id}','rejected')">Reject</button>
              </div>
            ` : `<span class="badge ${a.status === 'approved' ? 'badge-verified' : 'badge-rejected'}">${a.status}</span>`}
          </div>
        </div>
      </div>
    `).join('') : '<div class="empty-state" style="padding:2rem"><div class="empty-icon"></div><p>No applications yet.</p></div>';
  } catch (err) { document.getElementById('applicantsBody').innerHTML = `<div class="alert alert-danger">${err.message}</div>`; }
}

async function decide(appId, decision) {
  try {
    await API.patch(`/gigs/applications/${appId}/decide`, { decision });
    Toast.success(`Application ${decision}!`);
    closeModal('applicantsModal');
    load();
  } catch (err) { Toast.error(err.message); }
}

function openVerify(taskId, gigTitle, email, intent) {
  currentTaskId = taskId;
  document.getElementById('verifyDesc').textContent = `Task: "${gigTitle}" by ${email}`;
  document.getElementById('rejectReason').value = '';
  document.getElementById('verifyAlert').innerHTML = '';
  document.getElementById('verifyModal').classList.add('open');

  document.getElementById('approveBtn').onclick = () => submitVerify('approved');
  document.getElementById('rejectBtn').onclick = () => submitVerify('rejected');
}

async function submitVerify(decision) {
  const reason = document.getElementById('rejectReason').value.trim();
  if (decision === 'rejected' && reason.length < 5) { Validator.showError(document.getElementById('rejectReason'), 'Please provide a reason for rejection.'); return; }
  try {
    await API.patch(`/tasks/${currentTaskId}/verify`, { decision, reason });
    Toast.success(`Task ${decision}!`);
    closeModal('verifyModal');
    load();
  } catch (err) { document.getElementById('verifyAlert').innerHTML = `<div class="alert alert-danger">${err.message}</div>`; }
}

async function cancelGig(gigId) {
  if (!confirm('Are you sure you want to cancel this gig?')) return;
  try {
    await API.delete(`/gigs/${gigId}`);
    Toast.success('Gig cancelled.');
    load();
  } catch (err) { Toast.error(err.message); }
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

load();
</script>
</body>
</html>
